name: Browser demo smoke tests

on:
  pull_request:
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"

permissions:
  contents: read

jobs:
  coi:
    name: COI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Install browser demo dependencies
        working-directory: apps/browser-demos
        run: npm ci --no-audit --no-fund

      - name: Install host dependencies
        working-directory: host
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund

      - name: Typecheck host package
        working-directory: host
        run: npm run typecheck

      - name: Install Playwright browsers
        working-directory: apps/browser-demos
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser smoke tests
        working-directory: apps/browser-demos
        run: |
          npx playwright test \
            test/coi.spec.ts \
            test/browser-kernel-lazy-registration.spec.ts \
            test/wasm-trap-signal.spec.ts \
            --project=chromium \
            --project=firefox \
            --project=webkit
