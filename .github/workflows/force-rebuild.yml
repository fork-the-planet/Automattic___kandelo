name: Force rebuild

# Manually-triggered escape hatch for refreshing the durable binaries
# release. Drives the same per-package matrix flow as prepare-merge.yml
# (preflight + toolchain-cache + matrix-build + test-gate), with one
# adjustment: the named packages BYPASS preflight's "already-published"
# skip-check. Use this when the cache_key composition is suspected
# incomplete (e.g., a toolchain pin was bumped without invalidating
# package archives) and you want to confirm the published archives match
# a fresh source build.
#
# Flow (see docs/plans/2026-05-13-binary-resolution-via-index-ledger-design.md):
#   * targets the undated `binaries-abi-v<N>` tag (per-archive uploads),
#   * forces the listed packages back into the matrix even when their
#     cache_key_sha is already published (preflight's skip-check is
#     suppressed for them),
#   * builds each `(package, arch)` pair in parallel via `xtask
#     archive-stage`,
#   * each matrix entry publishes its archive AND updates
#     index.toml atomically via scripts/index-update.sh under the
#     workflow-level state-lock subject for the target tag, then
#   * gates on the test-suite.
#
# No bot PR is opened (the prior amend-package-toml flow is retired):
# the index.toml ledger on the release IS the consumer-visible state
# post binary-resolution-via-index-ledger.
#
# Inputs (rendered in the GitHub Actions "Run workflow" modal):
#   packages       — `all` (default) or a comma-separated list of
#                    package.toml names (e.g. `php,mariadb`). `all`
#                    forces every library + program manifest in the
#                    registry into the build matrix; a list narrows it.
#                    All listed packages bypass D3 (the "already
#                    published" skip-check); unlisted packages still go
#                    through the normal cache_key_sha gate.
#   arches         — comma-separated subset of `wasm32,wasm64`
#                    (default: both). Manifests whose `target_arches`
#                    don't include a requested arch are silently
#                    skipped.
#   ref            — git ref to build from. Defaults to the branch the
#                    workflow was triggered from (`github.ref_name`),
#                    so dispatching from a PR branch tests the PR's
#                    sources rather than silently building `main`. Set
#                    to a specific tag/sha for a one-shot rebuild from
#                    history.
#   skip_tests     — when true, publishes without running the test
#                    suites. Defaults to false (tests must pass before
#                    publish). workflow_dispatch is maintainer-only,
#                    so this is treated as deliberate.
#   bump_packages  — DEPRECATED no-op. Post
#                    binary-resolution-via-index-ledger there is no
#                    bot PR to open (the index.toml ledger IS the
#                    consumer-visible state; package.toml carries no
#                    [binary] URLs to amend). Accepted for
#                    workflow_dispatch back-compat; ignored.
#
# Force-rebuild and prepare-merge can run simultaneously: each
# matrix-build entry acquires the same per-target-tag state-lock
# subject via scripts/index-update.sh, so per-package index updates
# serialize correctly even with both workflows in flight.

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package names, or `all`. Names match package.toml entries (e.g. php,mariadb). Listed packages bypass the cache-skip check.'
        required: false
        default: 'all'
        type: string
      arches:
        description: 'Comma-separated arch list. Subset of wasm32,wasm64.'
        required: false
        default: 'wasm32,wasm64'
        type: string
      ref:
        description: 'Git ref to build from. Empty = the branch the workflow was triggered from.'
        required: false
        default: ''
        type: string
      skip_tests:
        description: 'Publish without running the test suites. Use with care — durable releases normally gate on tests.'
        required: false
        default: false
        type: boolean
      bump_packages:
        description: 'After publish, open a bot PR amending each rebuilt package.toml. Disable for diagnostic-only rebuilds.'
        required: false
        default: true
        type: boolean

jobs:
  # ---------------------------------------------------------------------
  # gate — input validation. Lightweight and cheap so a malformed
  # workflow_dispatch payload fails before we burn matrix-build compute.
  # No PR-context gates (this is a maintainer-triggered workflow, not a
  # label event), so no review-state / required-checks / staging-build
  # waits like prepare-merge.yml has.
  # ---------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      build_ref: ${{ steps.resolve.outputs.build_ref }}
    steps:
      - name: Resolve inputs + validate
        id: resolve
        env:
          INPUT_PACKAGES: ${{ inputs.packages }}
          INPUT_ARCHES: ${{ inputs.arches }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail

          # Resolve ref: explicit input wins, else the dispatching ref.
          BUILD_REF="${INPUT_REF}"
          if [ -z "$BUILD_REF" ]; then
            BUILD_REF="${{ github.ref_name }}"
          fi
          echo "build_ref=$BUILD_REF" >> "$GITHUB_OUTPUT"

          # Validate `packages`: non-empty.
          if [ -z "$INPUT_PACKAGES" ]; then
            echo "::error::packages input is empty; expected `all` or a comma-separated list."
            exit 1
          fi

          # Validate `arches`: each entry must be wasm32 or wasm64.
          IFS=',' read -ra arr <<< "$INPUT_ARCHES"
          if [ "${#arr[@]}" -eq 0 ]; then
            echo "::error::arches input is empty; expected comma-separated subset of wasm32,wasm64."
            exit 1
          fi
          for a in "${arr[@]}"; do
            a="${a#"${a%%[![:space:]]*}"}"
            a="${a%"${a##*[![:space:]]}"}"
            case "$a" in
              wasm32|wasm64) ;;
              *) echo "::error::invalid arch \"$a\" (expected wasm32 or wasm64)."; exit 1 ;;
            esac
          done

          echo "force-rebuild gate ok: ref=$BUILD_REF packages=$INPUT_PACKAGES arches=$INPUT_ARCHES skip_tests=${{ inputs.skip_tests }} bump_packages=${{ inputs.bump_packages }}"

  # ---------------------------------------------------------------------
  # Per-package matrix flow.
  #
  # Mirrors prepare-merge.yml's preflight + toolchain-cache +
  # matrix-build + test-gate, with one adjustment: preflight reads
  # `INPUT_FORCE_PACKAGES` and force-includes listed packages in the
  # matrix even if their cache_key_sha is already published. This is
  # the D3 bypass. Each matrix-build job publishes its own archive +
  # index entry atomically via `scripts/index-update.sh`.
  #
  # A future cleanup PR can extract this shape into a reusable
  # `workflow_call` workflow shared between staging-build, prepare-merge,
  # and force-rebuild. For the Phase C cutover we deliberately copy-paste
  # to keep the diff localized.
  # ---------------------------------------------------------------------

  preflight:
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read           # gh release view (target tag probe)
    outputs:
      library_matrix: ${{ steps.compute.outputs.library_matrix }}
      program_matrix: ${{ steps.compute.outputs.program_matrix }}
      abi: ${{ steps.compute.outputs.abi }}
      target_tag: ${{ steps.compute.outputs.target_tag }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Fetch musl submodule
        # Hardened submodule fetch via the reusable action (PR #435).
        # preflight only needs musl (it builds xtask and computes the
        # matrix; tests/libc/libc-test and tests/sortix/os-test materialize in matrix-build /
        # test-gate via their own checkouts). Per-target-tag locking
        # happens inside `scripts/index-update.sh` (state-lock around
        # the index.toml mutation).
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Nix dev shell
        run: bash scripts/dev-shell.sh true

      - name: Cache xtask build
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            target
          key: preflight-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'tools/xtask/**') }}
          restore-keys: |
            preflight-${{ runner.os }}-

      - name: Build xtask
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo build --release -p xtask --target "$HOST_TARGET"
          '

      - name: Compute matrix (with D3 bypass for force-rebuild list)
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_FORCE_PACKAGES: ${{ inputs.packages }}
          INPUT_ARCHES: ${{ inputs.arches }}
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail

            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk "{print \$4}")
            echo "abi=$ABI" >> "$GITHUB_OUTPUT"

            # force-rebuild always targets the durable, undated tag.
            # Same target as prepare-merge.yml — both serialise on the
            # durable-release-lock so they can never publish at the
            # same moment.
            TARGET_TAG="binaries-abi-v${ABI}"
            echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

            # Build a comma-list of package names whose skip-check is
            # bypassed. `all` means every package; a name list narrows.
            FORCE_ALL=0
            FORCE_LIST=""
            if [ "$INPUT_FORCE_PACKAGES" = "all" ]; then
              FORCE_ALL=1
            else
              # Normalise (strip whitespace, drop empties).
              IFS="," read -ra _names <<< "$INPUT_FORCE_PACKAGES"
              for n in "${_names[@]}"; do
                n="${n#"${n%%[![:space:]]*}"}"
                n="${n%"${n##*[![:space:]]}"}"
                [ -n "$n" ] && FORCE_LIST="$FORCE_LIST,$n,"
              done
            fi
            echo "force-rebuild bypass: all=$FORCE_ALL list=$FORCE_LIST"

            # Restrict arches per the workflow input. Empty input
            # (already rejected by gate) would mean "no arches"; a
            # well-formed input is a comma list of wasm32/wasm64.
            ARCH_FILTER=""
            IFS="," read -ra _arches <<< "$INPUT_ARCHES"
            for a in "${_arches[@]}"; do
              a="${a#"${a%%[![:space:]]*}"}"
              a="${a%"${a##*[![:space:]]}"}"
              [ -n "$a" ] && ARCH_FILTER="$ARCH_FILTER,$a,"
            done

            existing_assets=$(gh release view "$TARGET_TAG" --repo "${{ github.repository }}" --json assets --jq "[.assets[].name]" 2>/dev/null || echo "[]")
            echo "existing-assets:"
            echo "$existing_assets" | jq -r ".[]" | head -20
            echo "..."

            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            library_matrix="[]"
            program_matrix="[]"

            for pkg_dir in packages/registry/*/; do
              pkg=$(basename "$pkg_dir")
              if ! grep -q "^\[build\]" "$pkg_dir/package.toml"; then
                continue
              fi

              kind=$(sed -nE "s/^kind *= *\"([^\"]+)\".*/\\1/p" "$pkg_dir/package.toml" | head -1)
              case "$kind" in
                library|program) ;;
                *) echo "preflight: skipping $pkg (kind=$kind)" >&2; continue ;;
              esac

              if [ "$FORCE_ALL" = "1" ]; then
                bypass=1
              elif [ -n "$FORCE_LIST" ] && echo "$FORCE_LIST" | grep -q ",${pkg},"; then
                bypass=1
              else
                bypass=0
              fi

              # Version + revision for the per-matrix-entry
              # scripts/index-update.sh invocation downstream.
              version=$(sed -nE "s/^version *= *\"([^\"]+)\".*/\\1/p" "$pkg_dir/package.toml" | head -1)
              revision=1
              if [ -f "$pkg_dir/build.toml" ]; then
                revision=$(sed -nE "s/^revision *= *([0-9]+).*/\\1/p" "$pkg_dir/build.toml" | head -1)
                revision=${revision:-1}
              fi
              arches=$(awk -F'"'"'[][]'"'"' '"'"'/^arches *=/ {print $2}'"'"' "$pkg_dir/package.toml" | tr -d '"'"' "'"'"' | tr '"'"','"'"' '"'"' '"'"')
              arches=${arches:-wasm32}
              for arch in $arches; do
                if ! echo "$ARCH_FILTER" | grep -q ",${arch},"; then
                  continue
                fi

                sha=$(cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
                  compute-cache-key-sha --package "$pkg_dir" --arch "$arch" 2>/dev/null) || {
                  echo "preflight: skipping $pkg/$arch (compute-cache-key-sha failed)" >&2
                  continue
                }
                short=${sha:0:8}
                prefix="${pkg}-"
                suffix="-abi${ABI}-${arch}-${short}.tar.zst"

                if [ "$bypass" = "1" ]; then
                  echo "preflight: FORCE $pkg/$arch (sha $short, bypass=on)"
                elif echo "$existing_assets" | jq -e --arg pre "$prefix" --arg suf "$suffix" \
                    "any(.[]; startswith(\$pre) and endswith(\$suf))" >/dev/null; then
                  echo "preflight: skip $pkg/$arch (sha $short already published, not in force list)"
                  continue
                fi
                entry=$(jq -nc --arg pkg "$pkg" --arg arch "$arch" --arg sha "$sha" \
                                --arg ver "$version" --argjson rev "$revision" \
                  "{package: \$pkg, arch: \$arch, sha: \$sha, version: \$ver, revision: \$rev}")
                if [ "$kind" = "library" ]; then
                  library_matrix=$(echo "$library_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                else
                  program_matrix=$(echo "$program_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                fi
              done
            done

            program_matrix_file=$(mktemp)
            printf "%s" "$program_matrix" > "$program_matrix_file"
            program_matrix=$(cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              sort-package-matrix \
                --registry packages/registry \
                --matrix "$program_matrix_file")
            rm -f "$program_matrix_file"

            echo "library_matrix=$library_matrix" >> "$GITHUB_OUTPUT"
            echo "program_matrix=$program_matrix" >> "$GITHUB_OUTPUT"
            echo "preflight: library=$(echo "$library_matrix" | jq length) program=$(echo "$program_matrix" | jq length)"
            echo "library_matrix:"; echo "$library_matrix" | jq .
            echo "program_matrix:"; echo "$program_matrix" | jq .
          '

  toolchain-cache:
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Fetch musl submodule
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 libc/musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Check libcxx LLVM version
        run: bash scripts/dev-shell.sh bash scripts/check-libcxx-toolchain-version.sh

      - name: Compute cache key
        # Mirrors `prepare-merge.yml` / `staging-build.yml`'s formula
        # exactly so a hit on either workflow's cache warms this one.
        id: key
        run: |
          KEY="musl-sysroot-v4-${{ runner.os }}-${{ hashFiles('scripts/build-musl.sh', 'packages/registry/libcxx/**', 'libc/musl-overlay/**', 'libc/glue/**') }}"
          echo "value=$KEY" >> "$GITHUB_OUTPUT"
          echo "toolchain-cache key: $KEY"

      - name: Cache musl sysroot + libc++
        uses: actions/cache@v5.0.5
        id: cache
        with:
          path: |
            sysroot
            sysroot64
          key: ${{ steps.key.outputs.value }}

      - name: Build sysroots if cache miss
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            HOST_TARGET="$(rustc -vV | awk "/^host/ {print \$2}")"
            for arch in wasm32 wasm64; do
              cargo run -p xtask --target "$HOST_TARGET" --quiet -- \
                build-deps resolve libcxx --arch "$arch"
              prefix="$(cargo run -p xtask --target "$HOST_TARGET" --quiet -- \
                build-deps path libcxx --arch "$arch")"
              if [ "$arch" = "wasm64" ]; then sysroot="sysroot64"; else sysroot="sysroot"; fi
              mkdir -p "$sysroot/lib" "$sysroot/include/c++"
              ln -sf "$prefix/lib/libc++.a"    "$sysroot/lib/libc++.a"
              ln -sf "$prefix/lib/libc++abi.a" "$sysroot/lib/libc++abi.a"
              rm -rf "$sysroot/include/c++/v1"
              ln -sfn "$prefix/include/c++/v1" "$sysroot/include/c++/v1"
            done
          '

      - name: Build fork-instrument host tool
        run: bash scripts/dev-shell.sh bash scripts/build-fork-instrument-tool.sh

      - name: Pack toolchain sysroots + host tools
        run: |
          tar --zstd -cf "$RUNNER_TEMP/toolchain-sysroots.tar.zst" \
            sysroot sysroot64 tools/bin/wasm-fork-instrument

      - name: Upload toolchain sysroots artifact
        uses: actions/upload-artifact@v7
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain-sysroots.tar.zst
          retention-days: 1
          if-no-files-found: error

  # Library wave — kind=library packages. See staging-build.yml.
  lib-matrix-build:
    needs: [gate, preflight, toolchain-cache]
    if: needs.preflight.outputs.library_matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      actions: read      # verify a previous state-lock owner is terminal
      contents: write    # state-lock git push + gh release create/upload
    env:
      WASM_POSIX_BINARY_INDEX_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.target_tag }}/index.toml
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.library_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Compute commit-bound build provenance
        id: provenance
        run: |
          ts=$(git log -1 --format=%aI HEAD)
          echo "build-timestamp=$ts" >> "$GITHUB_OUTPUT"
          echo "build-host=${{ github.repository }}@${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v8
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Install host npm deps (build prereq)
        run: |
          bash scripts/dev-shell.sh bash -c '
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        id: build
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              archive-stage \
                --package "packages/registry/${{ matrix.package }}" \
                --arch "${{ matrix.arch }}" \
                --out "$RUNNER_TEMP/staged" \
                --build-timestamp "${{ steps.provenance.outputs.build-timestamp }}" \
                --build-host "${{ steps.provenance.outputs.build-host }}" \
                --binaries-dir "$(pwd)/binaries" \
                --expected-cache-key-sha "${{ matrix.sha }}"
          '
          archive_path=$(find "$RUNNER_TEMP/staged" -name '*.tar.zst' -print -quit)
          archive_name=$(basename "$archive_path")
          echo "archive-path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "archive-name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/staged/*.tar.zst
          retention-days: 7
          if-no-files-found: error

      # Atomic per-matrix-entry publish. See prepare-merge.yml /
      # staging-build.yml for the rationale; force-rebuild reuses the
      # same scripts/index-update.sh entry point and per-tag
      # state-lock subjects.
      - name: Publish archive + index entry
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/index-update.sh \
            --target-tag "${{ needs.preflight.outputs.target_tag }}" \
            --package "${{ matrix.package }}" \
            --version "${{ matrix.version }}" \
            --revision "${{ matrix.revision }}" \
            --arch "${{ matrix.arch }}" \
            --status success \
            --archive-path "${{ steps.build.outputs.archive-path }}" \
            --archive-name "${{ steps.build.outputs.archive-name }}" \
            --cache-key-sha "${{ matrix.sha }}"

      - name: Record failed build in index
        if: ${{ failure() && steps.checkout.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/index-update.sh \
            --target-tag "${{ needs.preflight.outputs.target_tag }}" \
            --package "${{ matrix.package }}" \
            --version "${{ matrix.version }}" \
            --revision "${{ matrix.revision }}" \
            --arch "${{ matrix.arch }}" \
            --status failed \
            --error "matrix-build failed; see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true

  # Program wave — kind=program packages, gated on the library wave.
  matrix-build:
    needs: [gate, preflight, toolchain-cache, lib-matrix-build]
    if: ${{ !cancelled() && needs.preflight.outputs.program_matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read      # gh run download for selected program dependency artifacts
      contents: write    # state-lock git push + gh release create/upload
    env:
      WASM_POSIX_BINARY_INDEX_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.target_tag }}/index.toml
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.program_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Compute commit-bound build provenance
        id: provenance
        run: |
          ts=$(git log -1 --format=%aI HEAD)
          echo "build-timestamp=$ts" >> "$GITHUB_OUTPUT"
          echo "build-host=${{ github.repository }}@${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "provenance: build-timestamp=$ts" >&2

      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v8
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Install host npm deps (build prereq)
        run: |
          bash scripts/dev-shell.sh bash -c '
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Resolve selected library artifacts
        if: needs.preflight.outputs.library_matrix != '[]'
        run: |
          set -euo pipefail
          matrix_file="$RUNNER_TEMP/library-matrix.json"
          artifact_file="$RUNNER_TEMP/library-dependency-artifacts.txt"
          printf '%s\n' '${{ needs.preflight.outputs.library_matrix }}' > "$matrix_file"
          jq -r '.[] | "\(.package)-\(.arch)"' "$matrix_file" > "$artifact_file"

          if [ -s "$artifact_file" ]; then
            while IFS= read -r artifact; do
              if ! [[ "$artifact" =~ ^[A-Za-z0-9._-]+-wasm(32|64)$ ]]; then
                echo "::error::invalid library artifact name from library matrix: '$artifact'"
                exit 1
              fi
            done < "$artifact_file"
            echo "selected library dependency artifacts:"
            sed 's/^/  /' "$artifact_file"
          else
            echo "selected library dependency artifacts: none"
          fi

      - name: Resolve selected program dependency artifacts
        id: program-deps
        run: |
          set -euo pipefail
          matrix_file="$RUNNER_TEMP/program-matrix.json"
          artifact_file="$RUNNER_TEMP/program-dependency-artifacts.txt"
          printf '%s\n' '${{ needs.preflight.outputs.program_matrix }}' > "$matrix_file"
          bash scripts/dev-shell.sh bash -lc '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              package-dependency-artifacts \
                --registry packages/registry \
                --matrix "$RUNNER_TEMP/program-matrix.json" \
                --package "${{ matrix.package }}" \
                --arch "${{ matrix.arch }}" \
                > "$RUNNER_TEMP/program-dependency-artifacts.txt"
          '

          if [ -s "$artifact_file" ]; then
            while IFS= read -r artifact; do
              if ! [[ "$artifact" =~ ^[A-Za-z0-9._-]+-wasm(32|64)$ ]]; then
                echo "::error::invalid dependency artifact name from package-dependency-artifacts: '$artifact'"
                exit 1
              fi
            done < "$artifact_file"
            echo "has-dependencies=true" >> "$GITHUB_OUTPUT"
            echo "selected program dependency artifacts:"
            sed 's/^/  /' "$artifact_file"
          else
            echo "has-dependencies=false" >> "$GITHUB_OUTPUT"
            echo "selected program dependency artifacts: none"
          fi

      - name: Collect dependency artifacts
        id: deps
        run: |
          set -euo pipefail
          artifacts_file="$RUNNER_TEMP/dependency-artifacts.txt"
          : > "$artifacts_file"
          for file in \
            "$RUNNER_TEMP/library-dependency-artifacts.txt" \
            "$RUNNER_TEMP/program-dependency-artifacts.txt"
          do
            [ -f "$file" ] || continue
            cat "$file"
          done | sed '/^$/d' | sort -u > "$artifacts_file"

          if [ -s "$artifacts_file" ]; then
            echo "has-dependencies=true" >> "$GITHUB_OUTPUT"
            echo "dependency artifacts to download:"
            sed 's/^/  /' "$artifacts_file"
          else
            echo "has-dependencies=false" >> "$GITHUB_OUTPUT"
            echo "dependency artifacts to download: none"
          fi

      - name: Download selected dependency archives
        if: ${{ steps.deps.outputs.has-dependencies == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .github/scripts/download-dependency-artifacts.sh "$RUNNER_TEMP/dependency-artifacts.txt" "$RUNNER_TEMP/lib-archives"

      - name: Materialize dependency overlays
        if: ${{ steps.deps.outputs.has-dependencies == 'true' }}
        run: |
          bash scripts/materialize-pr-overlays.sh "$RUNNER_TEMP/lib-archives"

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        id: build
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              archive-stage \
                --package "packages/registry/${{ matrix.package }}" \
                --arch "${{ matrix.arch }}" \
                --out "$RUNNER_TEMP/staged" \
                --build-timestamp "${{ steps.provenance.outputs.build-timestamp }}" \
                --build-host "${{ steps.provenance.outputs.build-host }}" \
                --binaries-dir "$(pwd)/binaries" \
                --expected-cache-key-sha "${{ matrix.sha }}"
          '
          archive_path=$(find "$RUNNER_TEMP/staged" -name '*.tar.zst' -print -quit)
          archive_name=$(basename "$archive_path")
          echo "archive-path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "archive-name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/staged/*.tar.zst
          retention-days: 7
          if-no-files-found: error

      # Atomic per-matrix-entry publish — same flow as
      # lib-matrix-build above. force-rebuild typically targets the
      # durable binaries-abi-v<N> tag, so this writes into the same
      # state-lock subject prepare-merge uses. The lock serializes
      # them.
      - name: Publish archive + index entry
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/index-update.sh \
            --target-tag "${{ needs.preflight.outputs.target_tag }}" \
            --package "${{ matrix.package }}" \
            --version "${{ matrix.version }}" \
            --revision "${{ matrix.revision }}" \
            --arch "${{ matrix.arch }}" \
            --status success \
            --archive-path "${{ steps.build.outputs.archive-path }}" \
            --archive-name "${{ steps.build.outputs.archive-name }}" \
            --cache-key-sha "${{ matrix.sha }}"

      - name: Record failed build in index
        if: ${{ failure() && steps.checkout.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/index-update.sh \
            --target-tag "${{ needs.preflight.outputs.target_tag }}" \
            --package "${{ matrix.package }}" \
            --version "${{ matrix.version }}" \
            --revision "${{ matrix.revision }}" \
            --arch "${{ matrix.arch }}" \
            --status failed \
            --error "matrix-build failed; see ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true

  test-gate-prepare:
    needs: [gate, preflight, toolchain-cache, lib-matrix-build, matrix-build]
    # Skip when both matrices are empty (nothing rebuilt) or
    # skip_tests=true. `!cancelled()` so a fail-fast in matrix-build
    # doesn't silently skip test preparation for sibling packages that
    # did succeed.
    if: |
      !cancelled() &&
      (needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]') &&
      inputs.skip_tests != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      WASM_POSIX_BINARY_INDEX_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.target_tag }}/index.toml
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Fetch submodules (musl, libc-test, os-test)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 libc/musl tests/libc/libc-test tests/sortix/os-test

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@v8
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Download matrix artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: '*-wasm*'
          path: ${{ runner.temp }}/staged-archives

      - name: Install host npm deps (resolver prereq)
        # Must run before Materialize binaries (see staging-build.yml).
        run: |
          bash scripts/dev-shell.sh bash -c '
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Typecheck host package
        run: |
          bash scripts/dev-shell.sh bash -c '
            cd host && npm run typecheck
          '

      - name: Materialize binaries (per-package package.pr.toml overlay)
        # Walk downloaded matrix artifacts (lib + prog) via the shared
        # script, then run fetch-binaries to resolve via overlay
        # (matrix-built file://) or package.toml (durable https://).
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            STAGE="$RUNNER_TEMP/staged-overlay"
            bash scripts/materialize-pr-overlays.sh "$RUNNER_TEMP/staged-archives" "$STAGE"
            bash scripts/fetch-binaries.sh --allow-stale
          '

      - name: Build kernel + test programs + install host deps
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            cargo build --release -p kandelo \
              -Z build-std=core,alloc
            mkdir -p local-binaries
            cp target/wasm32-unknown-unknown/release/kandelo_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund && cd ..
            bash scripts/build-rootfs.sh
          '

      - name: Pack prepared test workspace
        run: |
          bash scripts/pack-ci-test-workspace.sh "$RUNNER_TEMP/test-workspace.tar.zst"

      - name: Upload prepared test workspace
        uses: actions/upload-artifact@v7
        with:
          name: test-workspace
          path: ${{ runner.temp }}/test-workspace.tar.zst
          retention-days: 1
          if-no-files-found: error

  test-suite:
    name: test-suite (${{ matrix.suite }})
    needs: [gate, test-gate-prepare]
    if: |
      !cancelled() &&
      needs.test-gate-prepare.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: cargo-kernel
            needs_submodules: false
            needs_toolchain: false
            needs_workspace: false
          - suite: fork-instrument
            needs_submodules: false
            needs_toolchain: false
            needs_workspace: false
          - suite: vitest
            needs_submodules: false
            needs_toolchain: true
            needs_workspace: true
          - suite: libc
            needs_submodules: true
            needs_toolchain: true
            needs_workspace: true
          - suite: posix
            needs_submodules: false
            needs_toolchain: true
            needs_workspace: true
          - suite: sortix
            needs_submodules: true
            needs_toolchain: true
            needs_workspace: true
    env:
      SUITE: ${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.gate.outputs.build_ref }}

      - name: Fetch submodules (musl, libc-test, os-test)
        if: matrix.needs_submodules == true
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 libc/musl tests/libc/libc-test tests/sortix/os-test

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Download toolchain sysroots artifact
        if: matrix.needs_toolchain == true
        uses: actions/download-artifact@v8
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        if: matrix.needs_toolchain == true
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Download prepared test workspace
        if: matrix.needs_workspace == true
        uses: actions/download-artifact@v8
        with:
          name: test-workspace
          path: ${{ runner.temp }}/test-workspace

      - name: Extract prepared test workspace
        if: matrix.needs_workspace == true
        run: |
          tar --zstd -xf "$RUNNER_TEMP/test-workspace/test-workspace.tar.zst"

      - name: Run ${{ matrix.suite }} suite
        run: |
          bash scripts/dev-shell.sh bash scripts/ci-run-test-suite.sh "$SUITE"

  test-gate:
    needs: [test-gate-prepare, test-suite]
    if: |
      always() &&
      !cancelled() &&
      needs.test-gate-prepare.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Check split test suites
        env:
          PREPARE_RESULT: ${{ needs.test-gate-prepare.result }}
          TEST_SUITE_RESULT: ${{ needs.test-suite.result }}
        run: |
          set -euo pipefail
          if [ "$PREPARE_RESULT" != "success" ]; then
            echo "::error::test preparation completed with result: $PREPARE_RESULT"
            exit 1
          fi
          if [ "$TEST_SUITE_RESULT" != "success" ]; then
            echo "::error::split test suites completed with result: $TEST_SUITE_RESULT"
            exit 1
          fi

  # publish / generate-index / amend-package-toml /
  # merge-gate-finalize — REMOVED.
  #
  # Per binary-resolution-via-index-ledger, each matrix-build entry
  # publishes its archive + mutates index.toml atomically via
  # scripts/index-update.sh. There is no separate publish job, no
  # generate-index aggregation pass, no bot-PR amend, and no
  # merge-gate flow (force-rebuild is workflow_dispatch only,
  # not part of any PR merge path).
