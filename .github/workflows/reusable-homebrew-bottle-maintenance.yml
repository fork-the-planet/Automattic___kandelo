name: Reusable Kandelo Homebrew bottle maintenance

on:
  workflow_call:
    inputs:
      mode:
        type: string
        default: rebuild
      formulae:
        type: string
        required: true
      arches:
        type: string
        default: wasm32
      release-tag:
        type: string
        default: ""
      expected-cache-keys:
        type: string
        default: ""
      force:
        type: boolean
        default: false
      rollback-reason:
        type: string
        default: ""
      rollback-ref:
        type: string
        default: ""
      deleted-package-url:
        type: string
        default: ""
      deletion-reason:
        type: string
        default: ""

concurrency:
  group: kandelo-homebrew-bottle-maintenance-Automattic-kandelo-homebrew-${{ inputs.release-tag || github.run_id }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Validate maintenance mode
        shell: bash
        env:
          CALLER_EVENT_NAME: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          [ "$CALLER_REPOSITORY" = "Automattic/kandelo-homebrew" ] || {
            echo "::error::maintenance requires the first-party tap caller"; exit 2;
          }
          [ "$CALLER_REF" = "refs/heads/main" ] || {
            echo "::error::maintenance requires the tap main branch"; exit 2;
          }
          [ "$CALLER_EVENT_NAME" = "repository_dispatch" ] || {
            echo "::error::maintenance requires the reviewed repository_dispatch caller"; exit 2;
          }
          [ "$CALLER_WORKFLOW_REF" = "Automattic/kandelo-homebrew/.github/workflows/maintain-bottles.yml@refs/heads/main" ] || {
            echo "::error::maintenance requires the reviewed tap maintenance workflow"; exit 2;
          }
          case "$MODE" in
            rebuild|rollback) ;;
            *) echo "::error::mode must be rebuild or rollback"; exit 2 ;;
          esac

  rebuild:
    needs: [validate]
    if: ${{ inputs.mode == 'rebuild' }}
    permissions:
      contents: write
      packages: write
      actions: read
    uses: ./.github/workflows/reusable-homebrew-bottle-publish.yml
    with:
      kandelo-repository: Automattic/kandelo
      kandelo-ref: main
      tap-repository: Automattic/kandelo-homebrew
      tap-name: Automattic/kandelo-homebrew
      tap-ref: main
      formulae: ${{ inputs.formulae }}
      arches: ${{ inputs.arches }}
      release-tag: ${{ inputs.release-tag }}
      expected-cache-keys: ${{ inputs.expected-cache-keys }}
      force: ${{ inputs.force }}
      dry-run: false

  rollback:
    needs: [validate]
    if: ${{ inputs.mode == 'rollback' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: read
      actions: read
    steps:
      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Automattic/kandelo-homebrew
          ref: main
          path: tap
          fetch-depth: 0

      - name: Checkout Kandelo workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: Automattic/kandelo
          ref: main
          path: kandelo
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Record rollback without replacing last-green metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_ARCH: ${{ inputs.arches }}
          KANDELO_HOMEBREW_ROLLBACK_REASON: ${{ inputs.rollback-reason }}
          KANDELO_HOMEBREW_ROLLBACK_REF: ${{ inputs.rollback-ref }}
          KANDELO_HOMEBREW_DELETED_PACKAGE_URL: ${{ inputs.deleted-package-url }}
          KANDELO_HOMEBREW_DELETION_REASON: ${{ inputs.deletion-reason }}
          KANDELO_HOMEBREW_FORMULA: ${{ inputs.formulae }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          if ! [[ "$KANDELO_HOMEBREW_FORMULA" =~ ^[a-z0-9][a-z0-9._-]*$ ]]; then
            echo "::error::invalid formula name for rollback"
            exit 2
          fi
          case "$KANDELO_HOMEBREW_ARCH" in
            wasm32|wasm64) ;;
            *) echo "::error::invalid architecture for rollback"; exit 2 ;;
          esac
          if ! [[ "$KANDELO_HOMEBREW_RELEASE_TAG" =~ ^bottles-abi-v[1-9][0-9]*$ ]]; then
            echo "::error::invalid bottle release tag for rollback"
            exit 2
          fi
          publish_args=(
            --tap-root "$GITHUB_WORKSPACE/tap"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --status rollback
            --reason "$KANDELO_HOMEBREW_ROLLBACK_REASON"
          )
          if [ -n "$KANDELO_HOMEBREW_ROLLBACK_REF" ]; then
            publish_args+=(--rollback-ref "$KANDELO_HOMEBREW_ROLLBACK_REF")
          fi
          if [ -n "$KANDELO_HOMEBREW_DELETED_PACKAGE_URL" ]; then
            publish_args+=(--deleted-package-url "$KANDELO_HOMEBREW_DELETED_PACKAGE_URL")
          fi
          if [ -n "$KANDELO_HOMEBREW_DELETION_REASON" ]; then
            publish_args+=(--deletion-reason "$KANDELO_HOMEBREW_DELETION_REASON")
          fi
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh bash scripts/homebrew-publish-sidecars.sh "${publish_args[@]}"
