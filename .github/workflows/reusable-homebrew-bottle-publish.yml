name: Reusable Kandelo Homebrew bottle publish

on:
  workflow_call:
    inputs:
      kandelo-repository:
        type: string
        default: Automattic/kandelo
      kandelo-ref:
        type: string
        default: main
      tap-repository:
        type: string
        default: Automattic/kandelo-homebrew
      tap-ref:
        type: string
        default: main
      formulae:
        type: string
        required: true
      arches:
        type: string
        default: wasm32
      release-tag:
        type: string
        default: ""
      bottle-root-url:
        type: string
        default: ""
      sidecar-command:
        type: string
        default: "bash scripts/homebrew-generate-sidecars-from-env.sh"
      expected-cache-keys:
        type: string
        default: ""
      force:
        type: boolean
        default: false
      repair-only:
        type: boolean
        default: false
      dry-run:
        type: boolean
        default: false

concurrency:
  group: kandelo-homebrew-bottle-publish-${{ inputs.tap-repository }}-${{ inputs.release-tag || github.run_id }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      abi: ${{ steps.release.outputs.abi }}
      release-tag: ${{ steps.release.outputs.release-tag }}
      bottle-root-prefix: ${{ steps.release.outputs.bottle-root-prefix }}
    steps:
      - name: Validate caller trust boundary
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_REPOSITORY: ${{ inputs.kandelo-repository }}
          KANDELO_REF: ${{ inputs.kandelo-ref }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_REF: ${{ inputs.tap-ref }}
          BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
          SIDECAR_COMMAND: ${{ inputs.sidecar-command }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            exit 0
          fi
          [ "$KANDELO_REPOSITORY" = "Automattic/kandelo" ] || {
            echo "::error::publication requires Automattic/kandelo"; exit 2;
          }
          [ "$KANDELO_REF" = "main" ] || {
            echo "::error::publication requires Kandelo main"; exit 2;
          }
          [ "$TAP_REPOSITORY" = "Automattic/kandelo-homebrew" ] || {
            echo "::error::publication requires Automattic/kandelo-homebrew"; exit 2;
          }
          [ "$TAP_REF" = "main" ] || {
            echo "::error::publication requires tap main"; exit 2;
          }
          [ -z "$BOTTLE_ROOT_URL" ] || {
            echo "::error::publication derives its bottle root from the first-party tap"; exit 2;
          }
          [ "$SIDECAR_COMMAND" = "bash scripts/homebrew-generate-sidecars-from-env.sh" ] || {
            echo "::error::publication requires the reviewed sidecar generator"; exit 2;
          }

      - name: Checkout Kandelo workflow source
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ inputs.kandelo-ref }}
          path: kandelo
          submodules: false

      - name: Checkout tap
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: ${{ inputs.tap-ref }}
          path: tap

      - name: Resolve release and bottle root
        id: release
        shell: bash
        env:
          REQUESTED_BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release-tag }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          abi=$(sed -nE 's/^pub const ABI_VERSION: u32 = ([0-9]+);$/\1/p' kandelo/crates/shared/src/lib.rs | head -n1)
          if [ -z "$abi" ]; then
            echo "::error::could not read ABI_VERSION"
            exit 2
          fi
          release_tag="$REQUESTED_RELEASE_TAG"
          if [ -z "$release_tag" ]; then
            release_tag="bottles-abi-v${abi}"
          fi
          if ! [[ "$release_tag" =~ ^bottles-abi-v[1-9][0-9]*$ ]]; then
            echo "::error::release-tag must be bottles-abi-v<N>: $release_tag"
            exit 2
          fi
          root_prefix="$REQUESTED_BOTTLE_ROOT_URL"
          if [ -z "$root_prefix" ]; then
            tap_repo="$TAP_REPOSITORY"
            owner="${tap_repo%%/*}"
            repo="${tap_repo#*/}"
            owner="$(printf '%s' "$owner" | tr '[:upper:]' '[:lower:]')"
            repo="$(printf '%s' "$repo" | tr '[:upper:]' '[:lower:]')"
            root_prefix="https://ghcr.io/v2/${owner}/${repo}"
          fi
          {
            echo "abi=$abi"
            echo "release-tag=$release_tag"
            echo "bottle-root-prefix=$root_prefix"
          } >> "$GITHUB_OUTPUT"

      - name: Plan formula matrix
        id: matrix
        shell: bash
        env:
          ARCHES: ${{ inputs.arches }}
          EXPECTED_CACHE_KEYS_JSON: ${{ inputs.expected-cache-keys }}
          FORCE_REBUILD: ${{ inputs.force }}
          FORMULAE: ${{ inputs.formulae }}
        run: |
          set -euo pipefail
          expected_args=()
          if [ -n "$EXPECTED_CACHE_KEYS_JSON" ]; then
            expected_file="$RUNNER_TEMP/homebrew-expected-cache-keys.json"
            printf '%s\n' "$EXPECTED_CACHE_KEYS_JSON" >"$expected_file"
            jq empty "$expected_file"
            expected_args+=(--expected-cache-keys "$expected_file")
          fi
          if [ "$FORCE_REBUILD" = "true" ]; then
            expected_args+=(--force)
          fi
          matrix="$(bash kandelo/scripts/homebrew-plan-matrix.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --formulae "$FORMULAE" \
            --arches "$ARCHES" \
            "${expected_args[@]}")"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

  build-and-publish:
    needs: [plan]
    if: ${{ needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: ${{ inputs.tap-ref }}
          path: tap

      - name: Checkout Kandelo workflow source
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ inputs.kandelo-ref }}
          path: kandelo
          submodules: false

      - name: Install Homebrew
        uses: Homebrew/actions/setup-homebrew@1f8e202ffddf94def7f42f6fa3a482e821489f9c

      - name: Export Homebrew path and token env
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          FORMULA: ${{ matrix.formula }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          brew_bin="$(command -v brew)"
          homebrew_cache="$RUNNER_TEMP/homebrew-cache-${FORMULA}-${ARCH}"
          homebrew_temp="$RUNNER_TEMP/homebrew-temp-${FORMULA}-${ARCH}"
          mkdir -p "$homebrew_cache" "$homebrew_temp"
          {
            echo "HOMEBREW_BREW_FILE=$brew_bin"
            echo "HOMEBREW_CACHE=$homebrew_cache"
            echo "HOMEBREW_TEMP=$homebrew_temp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_INSTALL_CLEANUP=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_DEVELOPER=1"
            echo "HOMEBREW_GITHUB_API_TOKEN=$GH_TOKEN"
            echo "HOMEBREW_GITHUB_PACKAGES_TOKEN=$GH_TOKEN"
            echo "HOMEBREW_GITHUB_PACKAGES_USER=${GITHUB_ACTOR}"
            printf 'HOMEBREW_DOCKER_REGISTRY_TOKEN=%s\n' "$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w0)"
          } >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Build Kandelo sysroot
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config submodule.musl.url "https://github.com/ifduyue/musl.git"
          fetched=0
          for attempt in 1 2 3; do
            if timeout 180s git submodule update --init --depth 1 libc/musl; then
              fetched=1
              break
            fi
            echo "::warning::libc/musl fetch failed (attempt ${attempt}/3)"
            rm -f .git/index.lock
            find .git/modules -type f -name '*.lock' -delete 2>/dev/null || true
            sleep 10
          done
          if [ "$fetched" != "1" ]; then
            echo "::error::failed to fetch libc/musl"
            exit 1
          fi
          bash scripts/dev-shell.sh bash scripts/build-musl.sh

      - name: Build Kandelo kernel
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash packages/registry/kernel/build-kernel.sh

      - name: Install JavaScript dependencies for formula tests
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd ../apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Build, upload, and publish sidecars
        id: publish
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_SIDECAR_COMMAND: ${{ inputs.sidecar-command }}
          KANDELO_HOMEBREW_REPAIR_ONLY: ${{ inputs.repair-only }}
        run: |
          set -euo pipefail
          error_file="$RUNNER_TEMP/homebrew-publish-error.txt"
          : >"$error_file"
          {
            bottle_out="$RUNNER_TEMP/homebrew-bottle"
            sidecar_root="$RUNNER_TEMP/homebrew-sidecars"
            mkdir -p "$bottle_out" "$sidecar_root"

            cd "$GITHUB_WORKSPACE/kandelo"

            if [ "$KANDELO_HOMEBREW_REPAIR_ONLY" = "true" ]; then
              BOTTLE_ARCHIVE=""
              BOTTLE_JSON=""
              BOTTLE_URL=""
              BOTTLE_SHA256=""
              BOTTLE_BYTES=""
            else
              bash scripts/dev-shell.sh bash scripts/homebrew-bottle-build.sh \
                --tap-root "$GITHUB_WORKSPACE/tap" \
                --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
                --formula "$KANDELO_HOMEBREW_FORMULA" \
                --arch "$KANDELO_HOMEBREW_ARCH" \
                --out "$bottle_out" \
                --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"

              # shellcheck disable=SC1091
              . "$bottle_out/build.env"

              upload_env="$RUNNER_TEMP/homebrew-upload.env"
              upload_args=(
                --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
                --formula "$KANDELO_HOMEBREW_FORMULA"
                --arch "$KANDELO_HOMEBREW_ARCH"
                --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
                --bottle "$BOTTLE_ARCHIVE"
                --out-env "$upload_env"
              )
              if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
                upload_args+=(--dry-run)
              fi
              bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh "${upload_args[@]}"
              # shellcheck disable=SC1090
              . "$upload_env"
            fi

            sidecar_script="$RUNNER_TEMP/kandelo-homebrew-sidecars.sh"
            printf '%s\n' "$KANDELO_HOMEBREW_SIDECAR_COMMAND" >"$sidecar_script"
            if [ ! -s "$sidecar_script" ]; then
              echo "::error::sidecar-command must generate Kandelo/Homebrew sidecars"
              exit 2
            fi
            chmod +x "$sidecar_script"
            export KANDELO_HOMEBREW_TAP_ROOT="$GITHUB_WORKSPACE/tap"
            export KANDELO_HOMEBREW_SIDECAR_ROOT="$sidecar_root"
            export KANDELO_HOMEBREW_REPAIR_ONLY
            export KANDELO_HOMEBREW_PREVIOUS_METADATA="$GITHUB_WORKSPACE/tap/Kandelo/metadata.json"
            export KANDELO_HOMEBREW_BOTTLE_ARCHIVE="$BOTTLE_ARCHIVE"
            export KANDELO_HOMEBREW_BOTTLE_JSON="$BOTTLE_JSON"
            export KANDELO_HOMEBREW_BOTTLE_URL="$BOTTLE_URL"
            export KANDELO_HOMEBREW_BOTTLE_SHA256="$BOTTLE_SHA256"
            export KANDELO_HOMEBREW_BOTTLE_BYTES="$BOTTLE_BYTES"
            bash scripts/dev-shell.sh bash "$sidecar_script"

            browser_gallery_root=""
            if [ "$KANDELO_HOMEBREW_FORMULA" = "hello" ] && [ "$KANDELO_HOMEBREW_ARCH" = "wasm32" ]; then
              browser_vfs_root="$RUNNER_TEMP/homebrew-browser-vfs"
              browser_gallery_root="$RUNNER_TEMP/homebrew-browser-gallery"
              browser_public_dir="$GITHUB_WORKSPACE/kandelo/apps/browser-demos/public/__kandelo-smoke"
              browser_port="${KANDELO_PLAYWRIGHT_PORT:-5401}"
              browser_vfs="$browser_vfs_root/homebrew-hello.vfs.zst"
              browser_report="$browser_vfs_root/homebrew-hello.vfs-report.json"
              browser_url="http://127.0.0.1:${browser_port}/__kandelo-smoke/homebrew-hello.vfs.zst"
              mkdir -p "$browser_vfs_root" "$browser_gallery_root" "$browser_public_dir"

              bash scripts/dev-shell.sh npx tsx images/vfs/scripts/build-homebrew-vfs-image.ts \
                --metadata "$sidecar_root/Kandelo/metadata.json" \
                --tap-root "$sidecar_root" \
                --package hello \
                --arch wasm32 \
                --runtime node \
                --out "$browser_vfs" \
                --report "$browser_report" \
                --bottle-cache "$RUNNER_TEMP/homebrew-bottle-cache" \
                --write-profile
              cp "$browser_vfs" "$browser_public_dir/homebrew-hello.vfs.zst"

              (
                cd apps/browser-demos
                npx playwright install chromium --with-deps
                KANDELO_PLAYWRIGHT_PORT="$browser_port" \
                KANDELO_BROWSER_HELLO_VFS_URL="$browser_url" \
                npx playwright test test/kandelo-homebrew.spec.ts \
                  --project=chromium \
                  --grep "Homebrew hello VFS image boots"
              )

              export KANDELO_HOMEBREW_BROWSER_SMOKE_STATUS="success"
              export KANDELO_HOMEBREW_VFS_IMAGE="$browser_vfs"
              export KANDELO_HOMEBREW_VFS_REPORT="$browser_report"
              export KANDELO_HOMEBREW_GALLERY_ROOT="$browser_gallery_root"
              export KANDELO_HOMEBREW_BROWSER_SMOKE_URL="$browser_url"
              export KANDELO_HOMEBREW_BROWSER_SMOKE_COMMAND="/home/linuxbrew/.linuxbrew/bin/hello --version"

              rm -rf "$sidecar_root"
              mkdir -p "$sidecar_root"
              bash scripts/dev-shell.sh bash "$sidecar_script"

              bash scripts/homebrew-create-browser-gallery.sh \
                --metadata "$sidecar_root/Kandelo/metadata.json" \
                --image "$browser_vfs" \
                --report "$browser_report" \
                --out "$browser_gallery_root" \
                --formula hello \
                --title "GNU hello Homebrew VFS" \
                --description "GNU hello poured from the published Automattic/kandelo-homebrew bottle into a browser-smoked Kandelo VFS image."
              node scripts/validate-software-gallery.mjs \
                --gallery "$browser_gallery_root/gallery.json" \
                --index "$browser_gallery_root/index.toml"

              if [ "$KANDELO_HOMEBREW_DRY_RUN" != "true" ]; then
                if ! gh release view "$KANDELO_HOMEBREW_RELEASE_TAG" --repo "$KANDELO_HOMEBREW_TAP_REPOSITORY" >/dev/null 2>&1; then
                  gh release create "$KANDELO_HOMEBREW_RELEASE_TAG" \
                    --repo "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
                    --target "$(git -C "$GITHUB_WORKSPACE/tap" rev-parse HEAD)" \
                    --title "$KANDELO_HOMEBREW_RELEASE_TAG" \
                    --notes "Kandelo Homebrew bottle sidecars and browser gallery assets."
                fi
                gh release upload "$KANDELO_HOMEBREW_RELEASE_TAG" \
                  "$browser_gallery_root/gallery.json" \
                  "$browser_gallery_root/index.toml" \
                  "$browser_gallery_root"/*.tar.zst \
                  --repo "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
                  --clobber
              fi
            fi

            publish_args=(
              --tap-root "$GITHUB_WORKSPACE/tap"
              --sidecar-root "$sidecar_root"
              --formula "$KANDELO_HOMEBREW_FORMULA"
              --arch "$KANDELO_HOMEBREW_ARCH"
              --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
              --status success
            )
            if [ "$KANDELO_HOMEBREW_REPAIR_ONLY" = "true" ]; then
              publish_args+=(--repair-only)
            fi
            if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
              publish_args+=(--dry-run --no-lock)
            fi
            bash scripts/dev-shell.sh bash scripts/homebrew-publish-sidecars.sh "${publish_args[@]}"
          } 2> >(tee "$error_file" >&2)

      - name: Record failed attempt without replacing last-green metadata
        if: ${{ steps.publish.outcome != 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
        run: |
          set -euo pipefail
          error_text="$(tail -c 6000 "$RUNNER_TEMP/homebrew-publish-error.txt" || true)"
          publish_args=(
            --tap-root "$GITHUB_WORKSPACE/tap"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --status failed
            --error "$error_text"
          )
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            publish_args+=(--dry-run --no-lock)
          fi
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh bash scripts/homebrew-publish-sidecars.sh "${publish_args[@]}"

      - name: Upload bottle diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-${{ matrix.formula }}-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/homebrew-bottle/**
            ${{ runner.temp }}/homebrew-browser-gallery/**
            ${{ runner.temp }}/homebrew-browser-vfs/**
            ${{ runner.temp }}/homebrew-sidecars/**
            ${{ runner.temp }}/homebrew-*.txt
            ${{ runner.temp }}/homebrew-*.env
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail matrix entry after failure report is durable
        if: ${{ steps.publish.outcome != 'success' }}
        shell: bash
        run: exit 1
