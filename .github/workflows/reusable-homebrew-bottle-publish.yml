name: Reusable Kandelo Homebrew bottle publish

on:
  workflow_call:
    inputs:
      kandelo-repository:
        type: string
        default: Automattic/kandelo
      kandelo-ref:
        type: string
        default: main
      tap-repository:
        type: string
        default: kandelo-dev/homebrew-tap-core
      tap-name:
        type: string
        default: kandelo-dev/tap-core
      tap-ref:
        type: string
        default: main
      formulae:
        type: string
        required: true
      arches:
        type: string
        default: wasm32
      release-tag:
        type: string
        default: ""
      bottle-root-url:
        type: string
        default: ""
      expected-cache-keys:
        type: string
        default: ""
      force:
        type: boolean
        default: false
      dry-run:
        type: boolean
        default: false
      require-vfs-acceptance:
        type: boolean
        default: false
      github-packages-user:
        type: string
        default: ""
      require-github-packages-token:
        type: boolean
        default: false
    secrets:
      HOMEBREW_GITHUB_PACKAGES_TOKEN:
        required: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      formula-matrix: ${{ steps.matrix.outputs.formula-matrix }}
      abi: ${{ steps.release.outputs.abi }}
      release-tag: ${{ steps.release.outputs.release-tag }}
      bottle-root-prefix: ${{ steps.release.outputs.bottle-root-prefix }}
      kandelo-sha: ${{ steps.source-commits.outputs.kandelo-sha }}
      tap-sha: ${{ steps.source-commits.outputs.tap-sha }}
    steps:
      - name: Validate caller trust boundary
        id: trust
        shell: bash
        env:
          CALLER_EVENT_NAME: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_REPOSITORY: ${{ inputs.kandelo-repository }}
          KANDELO_REF: ${{ inputs.kandelo-ref }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_REF: ${{ inputs.tap-ref }}
          BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
        run: |
          set -euo pipefail
          normalize_dry_run_source_ref() {
            local label="$1"
            local ref="$2"

            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              printf '%s\n' "$ref"
              return 0
            fi
            if [ "${#ref}" -le 255 ] &&
               [[ "$ref" != refs/* ]] &&
               [[ "$ref" != -* ]] &&
               git check-ref-format "refs/heads/$ref" >/dev/null 2>&1; then
              printf 'refs/heads/%s\n' "$ref"
              return 0
            fi

            echo "::error::dry-run $label ref must be a branch name or exact lowercase 40-character commit SHA" >&2
            return 2
          }

          normalized_caller_repository="$(printf '%s' "$CALLER_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          normalized_tap_repository="$(printf '%s' "$TAP_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          normalized_tap_name="$(printf '%s' "$TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          [ "$normalized_caller_repository" = "$normalized_tap_repository" ] || {
            echo "::error::the caller repository must own the target tap repository"; exit 2;
          }
          [ "$CALLER_REF" = "refs/heads/main" ] || {
            echo "::error::publication requires the tap main branch"; exit 2;
          }
          [ "$CALLER_EVENT_NAME" = "repository_dispatch" ] || {
            echo "::error::publication requires the reviewed repository_dispatch caller"; exit 2;
          }
          [ -z "$BOTTLE_ROOT_URL" ] || {
            echo "::error::the publisher derives the bottle root from the Homebrew tap name"; exit 2;
          }
          [ "$KANDELO_REPOSITORY" = "Automattic/kandelo" ] || {
            echo "::error::publication requires Automattic/kandelo"; exit 2;
          }
          [[ "$normalized_tap_repository" =~ ^[a-z0-9_.-]+/homebrew-[a-z0-9_.-]+$ ]] || {
            echo "::error::tap repositories must use owner/homebrew-name"; exit 2;
          }
          tap_owner="${normalized_tap_repository%%/*}"
          tap_short_name="${normalized_tap_repository#*/homebrew-}"
          [ "$normalized_tap_name" = "${tap_owner}/${tap_short_name}" ] || {
            echo "::error::tap-name must be owner/name derived from the conventional repository"; exit 2;
          }
          if [ "$DRY_RUN" = "true" ]; then
            [ "$CALLER_WORKFLOW_REF" = "$CALLER_REPOSITORY/.github/workflows/dry-run-bottles.yml@refs/heads/main" ] || {
              echo "::error::dry-run publication requires the reviewed tap dry-run workflow"; exit 2;
            }
            validated_kandelo_ref="$(normalize_dry_run_source_ref "Kandelo" "$KANDELO_REF")"
            validated_tap_ref="$(normalize_dry_run_source_ref "tap" "$TAP_REF")"
          else
            case "$CALLER_WORKFLOW_REF" in
              "$CALLER_REPOSITORY/.github/workflows/publish-bottles.yml@refs/heads/main"|\
              "$CALLER_REPOSITORY/.github/workflows/maintain-bottles.yml@refs/heads/main") ;;
              *) echo "::error::publication requires a reviewed tap write workflow"; exit 2 ;;
            esac
            [ "$KANDELO_REF" = "main" ] || {
              echo "::error::write publication requires Kandelo main"; exit 2;
            }
            [ "$TAP_REF" = "main" ] || {
              echo "::error::write publication requires tap main"; exit 2;
            }
            validated_kandelo_ref="refs/heads/main"
            validated_tap_ref="refs/heads/main"
          fi
          {
            echo "kandelo-ref=$validated_kandelo_ref"
            echo "tap-ref=$validated_tap_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Kandelo workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ steps.trust.outputs.kandelo-ref }}
          path: kandelo
          submodules: false

      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ steps.trust.outputs.tap-ref }}
          path: tap

      - name: Resolve source commits
        id: source-commits
        shell: bash
        run: |
          set -euo pipefail
          kandelo_sha="$(git -C kandelo rev-parse HEAD)"
          tap_sha="$(git -C tap rev-parse HEAD)"
          [[ "$kandelo_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Kandelo checkout did not resolve to a commit SHA"; exit 2;
          }
          [[ "$tap_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::tap checkout did not resolve to a commit SHA"; exit 2;
          }
          {
            echo "kandelo-sha=$kandelo_sha"
            echo "tap-sha=$tap_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release and bottle root
        id: release
        shell: bash
        env:
          REQUESTED_BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release-tag }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          abi=$(sed -nE 's/^pub const ABI_VERSION: u32 = ([0-9]+);$/\1/p' kandelo/crates/shared/src/lib.rs | head -n1)
          if [ -z "$abi" ]; then
            echo "::error::could not read ABI_VERSION"
            exit 2
          fi
          expected_release_tag="bottles-abi-v${abi}"
          release_tag="${REQUESTED_RELEASE_TAG:-$expected_release_tag}"
          if [ "$release_tag" != "$expected_release_tag" ]; then
            echo "::error::release-tag $release_tag does not match resolved Kandelo ABI $abi"
            exit 2
          fi
          root_prefix="$REQUESTED_BOTTLE_ROOT_URL"
          if [ -z "$root_prefix" ]; then
            # Homebrew maps owner/name to the GitHub owner/homebrew-name repository,
            # but its GHCR bottle namespace remains owner/name.
            # shellcheck source=/dev/null
            . kandelo/scripts/homebrew-tap-identity.sh
            root_prefix="$(homebrew_bottle_root_url "$TAP_REPOSITORY" "$TAP_NAME")"
          fi
          {
            echo "abi=$abi"
            echo "release-tag=$release_tag"
            echo "bottle-root-prefix=$root_prefix"
          } >> "$GITHUB_OUTPUT"

      - name: Plan formula matrix
        id: matrix
        shell: bash
        env:
          ARCHES: ${{ inputs.arches }}
          EXPECTED_ABI: ${{ steps.release.outputs.abi }}
          EXPECTED_CACHE_KEYS_JSON: ${{ inputs.expected-cache-keys }}
          FORCE_REBUILD: ${{ inputs.force }}
          FORMULAE: ${{ inputs.formulae }}
        run: |
          set -euo pipefail
          expected_args=()
          if [ -n "$EXPECTED_CACHE_KEYS_JSON" ]; then
            expected_file="$RUNNER_TEMP/homebrew-expected-cache-keys.json"
            printf '%s\n' "$EXPECTED_CACHE_KEYS_JSON" >"$expected_file"
            jq empty "$expected_file"
            expected_args+=(--expected-cache-keys "$expected_file")
            expected_args+=(--expected-abi "$EXPECTED_ABI")
          fi
          if [ "$FORCE_REBUILD" = "true" ]; then
            expected_args+=(--force)
          fi
          matrix="$(bash kandelo/scripts/homebrew-plan-matrix.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --formulae "$FORMULAE" \
            --arches "$ARCHES" \
            "${expected_args[@]}")"
          formula_matrix="$(jq -c 'map({formula}) | unique_by(.formula)' <<<"$matrix")"
          {
            echo "matrix=$matrix"
            echo "formula-matrix=$formula_matrix"
          } >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

      - name: Validate dependency-bearing VFS acceptance selection
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          PLANNED_MATRIX: ${{ steps.matrix.outputs.matrix }}
          REQUIRE_VFS_ACCEPTANCE: ${{ inputs.require-vfs-acceptance }}
          TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          case "$REQUIRE_VFS_ACCEPTANCE" in
            true|false) ;;
            *) echo "::error::require-vfs-acceptance must be true or false"; exit 2 ;;
          esac

          tap_root="$(realpath "$GITHUB_WORKSPACE/tap")"
          policy_dir="$GITHUB_WORKSPACE/tap/Kandelo"
          if [ -L "$policy_dir" ] || { [ -e "$policy_dir" ] && [ ! -d "$policy_dir" ]; }; then
            echo "::error::tap Kandelo policy path must be a real directory"; exit 2
          fi
          config_candidate="$policy_dir/vfs-acceptance.json"
          if [ ! -e "$config_candidate" ] && [ ! -L "$config_candidate" ]; then
            if [ "$REQUIRE_VFS_ACCEPTANCE" = "true" ]; then
              echo "::error::this invocation requires dependency-bearing VFS acceptance, but the tap has no Kandelo/vfs-acceptance.json"
              exit 1
            fi
            echo "::notice::tap has no dependency-bearing VFS acceptance selection; this invocation will produce no closure acceptance evidence"
            exit 0
          fi
          [ -f "$config_candidate" ] && [ ! -L "$config_candidate" ] || {
            echo "::error::tap VFS acceptance configuration must be a regular non-symlink file"; exit 2;
          }
          config="$(realpath "$config_candidate")"
          case "$config" in
            "$tap_root"/*) ;;
            *) echo "::error::tap VFS acceptance configuration resolved outside the exact tap checkout"; exit 2 ;;
          esac
          jq -e '
            type == "object" and
            keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema"] and
            .schema == 1 and
            (.formula | type == "string" and test("^[a-z0-9][a-z0-9._-]*$")) and
            (.brewfile | type == "string" and length > 0 and length <= 255) and
            (.executable | type == "string" and test("^/([A-Za-z0-9._@%+=:-]+/)*[A-Za-z0-9._@%+=:-]+$")) and
            (.argv | type == "array" and length > 0 and length <= 64 and all(.[];
              type == "string" and length > 0 and length <= 4096 and contains("\u0000") == false) and
              (tojson | utf8bytelength <= 16384)) and
            (.expected_stdout | type == "string" and length > 0 and length <= 4096 and
              contains("\u0000") == false and contains("\u000a") == false and
              contains("\u000d") == false)
          ' "$config" >/dev/null || {
            echo "::error::tap VFS acceptance configuration is invalid"; exit 2;
          }

          selected_formula="$(jq -er '.formula' "$config")"
          formula_candidate="$GITHUB_WORKSPACE/tap/Formula/${selected_formula}.rb"
          [ -f "$formula_candidate" ] && [ ! -L "$formula_candidate" ] || {
            echo "::error::selected VFS acceptance formula is not a regular tap Formula: $selected_formula"; exit 2;
          }
          formula_source="$(realpath "$formula_candidate")"
          case "$formula_source" in
            "$tap_root"/*) ;;
            *) echo "::error::selected VFS acceptance Formula resolved outside the exact tap checkout"; exit 2 ;;
          esac
          brewfile_rel="$(jq -er '.brewfile' "$config")"
          case "$brewfile_rel" in
            /*|../*|*/../*|*/..) echo "::error::Brewfile path escapes the tap"; exit 2 ;;
          esac
          brewfile_candidate="$GITHUB_WORKSPACE/tap/$brewfile_rel"
          [ -f "$brewfile_candidate" ] && [ ! -L "$brewfile_candidate" ] || {
            echo "::error::tap VFS acceptance Brewfile must be a regular non-symlink file"; exit 2;
          }
          brewfile="$(realpath "$brewfile_candidate")"
          case "$brewfile" in
            "$tap_root"/*) ;;
            *) echo "::error::Brewfile resolved outside the exact tap checkout"; exit 2 ;;
          esac
          selection="$(ruby kandelo/scripts/homebrew-brewfile-selection.rb "$brewfile")"
          expected_tap="$(printf '%s' "$TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          jq -e --arg formula "$selected_formula" --arg tap "$expected_tap" \
            '.tap_name == $tap and (.packages | index($formula) != null)' \
            <<<"$selection" >/dev/null || {
            echo "::error::acceptance Brewfile must name the selected tap and Formula root"; exit 2;
          }

          target_planned="$(jq -r --arg formula "$selected_formula" \
            'any(.[]; .formula == $formula and .arch == "wasm32")' <<<"$PLANNED_MATRIX")"
          if [ "$REQUIRE_VFS_ACCEPTANCE" = "true" ]; then
            [ "$DRY_RUN" = "false" ] || {
              echo "::error::required dependency-bearing VFS acceptance needs a non-dry-run publication"; exit 1;
            }
            [ "$target_planned" = "true" ] || {
              echo "::error::required dependency-bearing VFS acceptance target ${selected_formula}/wasm32 is absent from the planned matrix; include it and use force when its bottle is already current"
              exit 1
            }
          elif [ "$DRY_RUN" = "true" ] || [ "$target_planned" != "true" ]; then
            echo "::notice::this invocation will produce no dependency-bearing VFS acceptance evidence"
          fi

  build-and-test:
    needs: [plan]
    if: ${{ needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout Kandelo workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Verify source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [[ "$KANDELO_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned Kandelo commit"; exit 2;
          }
          [[ "$TAP_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned tap commit"; exit 2;
          }
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo build checkout differs from the validated plan"; exit 2;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap build checkout differs from the validated plan"; exit 2;
          }

      - name: Checkout reviewed Homebrew implementation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: Homebrew/brew
          ref: 34c40c18ffa2029b611b61c73273e32c003d0842
          path: homebrew-prefix/Homebrew

      - name: Activate reviewed Homebrew implementation
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
        run: |
          set -euo pipefail
          [[ "$HOMEBREW_BREW_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid pinned Homebrew commit"; exit 2;
          }
          brew_prefix="/home/linuxbrew/.linuxbrew"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew checkout differs from the reviewed commit"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::reviewed Homebrew checkout has tracked modifications"; exit 2;
          }
          mkdir -p "$brew_prefix/bin"
          rm -f "$brew_prefix/bin/brew"
          ln -s "$brew_repository/bin/brew" "$brew_prefix/bin/brew"
          brew_bin="$brew_prefix/bin/brew"
          [ "$(readlink -f "$brew_bin")" = "$brew_repository/bin/brew" ] || {
            echo "::error::Homebrew executable does not resolve into the reviewed checkout"; exit 2;
          }
          homebrew_cache="$RUNNER_TEMP/homebrew-cache-${FORMULA}-${ARCH}"
          homebrew_temp="$RUNNER_TEMP/homebrew-temp-${FORMULA}-${ARCH}"
          mkdir -p "$homebrew_cache" "$homebrew_temp"
          {
            echo "HOMEBREW_BREW_FILE=$brew_bin"
            echo "HOMEBREW_BREW_COMMIT=$HOMEBREW_BREW_COMMIT"
            echo "HOMEBREW_CACHE=$homebrew_cache"
            echo "HOMEBREW_TEMP=$homebrew_temp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_INSTALL_CLEANUP=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_DEVELOPER=1"
          } >> "$GITHUB_ENV"
          export HOMEBREW_BREW_FILE="$brew_bin"
          export HOMEBREW_CACHE="$homebrew_cache"
          export HOMEBREW_TEMP="$homebrew_temp"
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          export HOMEBREW_NO_ANALYTICS=1
          export HOMEBREW_DEVELOPER=1
          "$brew_bin" --version
          [ "$("$brew_bin" --prefix)" = "$brew_prefix" ] || {
            echo "::error::Homebrew prefix is not the canonical Linuxbrew prefix"; exit 2;
          }
          [ "$("$brew_bin" --cellar)" = "$brew_prefix/Cellar" ] || {
            echo "::error::Homebrew cellar is not the canonical Linuxbrew cellar"; exit 2;
          }
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew moved during activation"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::Homebrew activation modified reviewed tracked files"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Build Kandelo sysroot
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          cd kandelo
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config submodule.musl.url "https://github.com/ifduyue/musl.git"
          fetched=0
          for attempt in 1 2 3; do
            if timeout 180s git submodule update --init --depth 1 libc/musl; then
              fetched=1
              break
            fi
            echo "::warning::libc/musl fetch failed (attempt ${attempt}/3)"
            rm -f .git/index.lock
            find .git/modules -type f -name '*.lock' -delete 2>/dev/null || true
            sleep 10
          done
          if [ "$fetched" != "1" ]; then
            echo "::error::failed to fetch libc/musl"
            exit 1
          fi
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          case "$KANDELO_HOMEBREW_ARCH" in
            wasm32) ;;
            wasm64)
              bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
              ;;
            *)
              echo "::error::unsupported Kandelo Homebrew architecture: $KANDELO_HOMEBREW_ARCH"
              exit 2
              ;;
          esac

      - name: Build Kandelo kernel
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash packages/registry/kernel/build-kernel.sh

      - name: Build fork-instrument host tool
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/build-fork-instrument-tool.sh

      - name: Materialize Formula test platform runtime
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host="$(rustc -vV | sed -n "s/^host: //p")"
            [ -n "$host" ] || {
              echo "unable to resolve the Rust host target" >&2
              exit 2
            }
            for package in dash coreutils grep sed rootfs; do
              cargo run --release -p xtask --target "$host" --quiet -- \
                build-deps --arch wasm32 \
                --binaries-dir "$PWD/binaries" --fetch-only resolve "$package"
            done
            bash scripts/materialize-resolver-binaries.sh "$PWD/binaries"
          '

      - name: Install JavaScript dependencies for formula tests
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd ../apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Create isolated Formula execution identity
        id: formula-identity
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-build"
          build_home="/home/$build_user"
          sudo_bin="/usr/bin/sudo"
          systemd_run_bin="/usr/bin/systemd-run"
          systemctl_bin="/usr/bin/systemctl"
          getent_bin="/usr/bin/getent"
          findmnt_bin="/usr/bin/findmnt"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          useradd_bin="/usr/sbin/useradd"
          userdel_bin="/usr/sbin/userdel"
          sudo_mode="$(stat -c '%a' "$sudo_bin" 2>/dev/null || true)"
          if [ ! -f "$sudo_bin" ] || [ -L "$sudo_bin" ] || [ ! -x "$sudo_bin" ] || \
             [ "$(stat -c '%u' "$sudo_bin" 2>/dev/null || true)" != "0" ] || \
             ! [[ "$sudo_mode" =~ ^[0-7]{3,4}$ ]] || \
             [ $((8#$sudo_mode & 0022)) -ne 0 ]; then
            echo "::error::runner sudo boundary is unavailable"; exit 2
          fi
          for protected_bin in "$systemd_run_bin" "$systemctl_bin" "$getent_bin" "$findmnt_bin" "$pgrep_bin" \
            "$useradd_bin" "$userdel_bin"; do
            protected_mode="$(stat -c '%a' "$protected_bin" 2>/dev/null || true)"
            if [ ! -f "$protected_bin" ] || [ -L "$protected_bin" ] || \
               [ ! -x "$protected_bin" ] || \
               [ "$(stat -c '%u' "$protected_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$protected_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$protected_mode & 0022)) -ne 0 ]; then
              echo "::error::protected process boundary is unavailable: $protected_bin"; exit 2
            fi
          done
          pkill_target="$(readlink -f -- "$pkill_bin" 2>/dev/null || true)"
          pkill_parent="$(dirname "$pkill_bin")"
          pkill_parent_mode="$(stat -c '%a' "$pkill_parent" 2>/dev/null || true)"
          if [ -L "$pkill_bin" ]; then
            if [ "$pkill_target" != "$pgrep_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               [ "$(stat -c '%u' "$pkill_parent" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_parent_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_parent_mode & 0022)) -ne 0 ]; then
              echo "::error::protected pkill boundary is unavailable: $pkill_bin"; exit 2
            fi
          else
            pkill_mode="$(stat -c '%a' "$pkill_bin" 2>/dev/null || true)"
            if [ ! -f "$pkill_bin" ] || [ ! -x "$pkill_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_mode & 0022)) -ne 0 ]; then
              echo "::error::protected pkill boundary is unavailable: $pkill_bin"; exit 2
            fi
          fi
          [ -d /run/systemd/system ] || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$sudo_bin" -n true || {
            echo "::error::runner cannot establish the privileged process boundary"; exit 2;
          }
          "$sudo_bin" -n -- "$systemctl_bin" show --property=Version --value >/dev/null || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$systemd_run_bin" --help | grep -F -- '--expand-environment=' >/dev/null || {
            echo "::error::runner systemd cannot preserve exact Brew arguments"; exit 2;
          }
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::reserved Formula build user already exists"; exit 2
          fi
          "$sudo_bin" -n -- "$useradd_bin" --system --user-group --create-home \
            --home-dir "$build_home" --shell /usr/sbin/nologin "$build_user"
          echo "created=true" >> "$GITHUB_OUTPUT"
          [ "$(id -u "$build_user")" != "$(id -u)" ] || {
            echo "::error::Formula build identity is not isolated"; exit 2;
          }
          if "$sudo_bin" -n -u "$build_user" -- "$sudo_bin" -n true >/dev/null 2>&1; then
            echo "::error::Formula build identity unexpectedly has sudo access"; exit 2
          fi
          shared_temp="$(mktemp -d /tmp/kandelo-homebrew.XXXXXX)"
          "$sudo_bin" chown root:root "$shared_temp"
          "$sudo_bin" chmod 1777 "$shared_temp"
          mkdir "$shared_temp/cache" "$shared_temp/tmp"
          {
            echo "KANDELO_HOMEBREW_BUILD_USER=$build_user"
            echo "KANDELO_HOMEBREW_SHARED_TEMP=$shared_temp"
            echo "KANDELO_HOMEBREW_SUDO_BIN=$sudo_bin"
            echo "KANDELO_HOMEBREW_SYSTEMD_RUN_BIN=$systemd_run_bin"
            echo "KANDELO_HOMEBREW_SYSTEMCTL_BIN=$systemctl_bin"
            echo "KANDELO_HOMEBREW_GETENT_BIN=$getent_bin"
            echo "KANDELO_HOMEBREW_PGREP_BIN=$pgrep_bin"
            echo "KANDELO_HOMEBREW_PKILL_BIN=$pkill_bin"
            echo "HOMEBREW_CACHE=$shared_temp/cache"
            echo "HOMEBREW_TEMP=$shared_temp/tmp"
          } >> "$GITHUB_ENV"

      - name: Provision Formula browser runtime
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_SHARED_TEMP="$KANDELO_HOMEBREW_SHARED_TEMP" \
            KANDELO_HOMEBREW_BUILD_USER="$KANDELO_HOMEBREW_BUILD_USER" \
            KANDELO_HOMEBREW_SUDO_BIN="$KANDELO_HOMEBREW_SUDO_BIN" \
            bash -c '
              set -euo pipefail
              node_bin="$(command -v node)"
              case "$node_bin" in
                /nix/store/*/bin/node) ;;
                *)
                  echo "Formula browser provisioning resolved an undeclared Node: $node_bin" >&2
                  exit 2
                  ;;
              esac
              bash scripts/homebrew-provision-formula-browser.sh \
                --shared-temp "$KANDELO_HOMEBREW_SHARED_TEMP" \
                --build-user "$KANDELO_HOMEBREW_BUILD_USER" \
                --sudo-bin "$KANDELO_HOMEBREW_SUDO_BIN" \
                --node-bin "$node_bin" \
                --browser-app "$PWD/apps/browser-demos"
            '

      - name: Build and test Homebrew bottle without publisher credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::unprivileged bottle build received $secret_name"; exit 2;
            }
          done
          [ "$(readlink -f "$HOMEBREW_BREW_FILE")" = \
            "$GITHUB_WORKSPACE/homebrew-prefix/Homebrew/bin/brew" ] || {
            echo "::error::absolute Homebrew executable differs from the reviewed checkout"; exit 2;
          }
          [ "$(git -C "$("$HOMEBREW_BREW_FILE" --repository)" rev-parse HEAD)" = \
            "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::active Homebrew checkout differs from the reviewed commit"; exit 2;
          }
          bottle_out="$RUNNER_TEMP/homebrew-bottle"
          mkdir -p "$bottle_out"
          cd "$GITHUB_WORKSPACE/kandelo"

          workflow_command_token="$(/usr/bin/od -An -N32 -tx1 /dev/urandom | \
            /usr/bin/tr -d ' \n')"
          [[ "$workflow_command_token" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::could not create the workflow-command boundary"; exit 2;
          }
          workflow_commands_stopped=0
          resume_workflow_commands() {
            if [ "$workflow_commands_stopped" = "1" ]; then
              printf '::%s::\n' "$workflow_command_token"
              workflow_commands_stopped=0
            fi
          }
          restore_workflow_commands_on_exit() {
            status="$?"
            set +e
            resume_workflow_commands
            exit "$status"
          }
          trap restore_workflow_commands_on_exit EXIT
          workflow_commands_stopped=1
          printf '::stop-commands::%s\n' "$workflow_command_token"
          bash scripts/dev-shell.sh bash scripts/homebrew-bottle-build.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --out "$bottle_out" \
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
          resume_workflow_commands
          trap - EXIT

      - name: Retire isolated Formula execution identity
        if: ${{ always() && steps.formula-identity.outputs.created == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-build"
          build_uid="$(id -u "$build_user")"
          sudo_bin="/usr/bin/sudo"
          systemctl_bin="/usr/bin/systemctl"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          userdel_bin="/usr/sbin/userdel"
          slice="kandelo-homebrew-build-${build_uid}.slice"

          uid_has_processes() {
            local status
            if "$sudo_bin" -n -- "$pgrep_bin" -u "$build_uid" >/dev/null 2>&1; then
              return 0
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && return 1
            echo "::error::could not inspect Formula build identity processes"
            return 2
          }

          "$sudo_bin" -n -- "$systemctl_bin" stop "$slice" >/dev/null 2>&1 || true
          "$sudo_bin" -n -- "$pkill_bin" -TERM -u "$build_uid" >/dev/null 2>&1 || true
          for ((attempt = 0; attempt < 50; attempt++)); do
            if uid_has_processes; then
              sleep 0.1
              continue
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && break
            exit "$status"
          done
          if uid_has_processes; then
            "$sudo_bin" -n -- "$pkill_bin" -KILL -u "$build_uid" >/dev/null 2>&1 || true
            sleep 1
          else
            status="$?"
            [ "$status" -eq 1 ] || exit "$status"
          fi
          if uid_has_processes; then
            echo "::error::Formula build identity still owns live processes"
            exit 1
          else
            status="$?"
            [ "$status" -eq 1 ] || exit "$status"
          fi
          "$sudo_bin" -n -- "$userdel_bin" -r "$build_user"
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::Formula build identity still exists after retirement"
            exit 1
          fi

      - name: Checkout exact post-build Kandelo validator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo-postbuild
          submodules: false

      - name: Checkout exact post-build tap source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-reviewed

      - name: Recheck reviewed sources after Formula execution
        shell: bash
        env:
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C "$GITHUB_WORKSPACE/kandelo-postbuild" rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::post-build Kandelo validator differs from the plan"; exit 2;
          }
          [ "$(git -C "$GITHUB_WORKSPACE/tap-reviewed" rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::post-build tap source differs from the plan"; exit 2;
          }
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew moved during formula execution"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::formula execution modified reviewed Homebrew tracked files"; exit 2;
          }
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-formula-source-closure.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-name "$TAP_NAME" \
            --formula "$FORMULA" \
            --base-ref "$TAP_SHA" \
            --reviewed-tap-root "$GITHUB_WORKSPACE/tap-reviewed"

      - name: Create strict bottle data handoff
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-bottle/build.env"
          bash scripts/dev-shell.sh bash scripts/homebrew-create-build-handoff.sh \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT" \
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL" \
            --bottle "$BOTTLE_ARCHIVE" \
            --bottle-json "$BOTTLE_JSON" \
            --dependency-provenance "$DEPENDENCY_PROVENANCE" \
            --forbidden-root "$GITHUB_WORKSPACE" \
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")" \
            --forbidden-root "$RUNNER_TEMP" \
            --forbidden-root "$KANDELO_HOMEBREW_SHARED_TEMP" \
            --forbidden-root "$HOMEBREW_TEMP" \
            --forbidden-root "$NATIVE_BUILD_ROOT" \
            --forbidden-root "/home/$KANDELO_HOMEBREW_BUILD_USER" \
            --out "$RUNNER_TEMP/homebrew-build-handoff"

      - name: Upload strict bottle build handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Compose deterministic Homebrew OCI child without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free OCI composer received $secret_name"; exit 2;
            }
          done
          validated="$RUNNER_TEMP/homebrew-oci-validated"
          artifact="$RUNNER_TEMP/homebrew-oci-child"
          mkdir -p "$validated" "$artifact"
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --tap-root "$GITHUB_WORKSPACE/tap-reviewed"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$validated/build.env"
            --out-bottle-json "$validated/bottle.json"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-build-handoff.sh \
            "${validation_args[@]}"
          # shellcheck disable=SC1091
          . "$validated/build.env"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py build-child \
            --formula "$FORMULA" \
            --arch "$ARCH" \
            --abi "$KANDELO_HOMEBREW_ABI" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-name "$TAP_NAME" \
            --tap-commit "$TAP_COMMIT" \
            --kandelo-commit "$KANDELO_COMMIT" \
            --bottle-root-url "$BOTTLE_ROOT_URL" \
            --bottle "$BOTTLE_ARCHIVE" \
            --bottle-json "$validated/bottle.json" \
            --kandelo-root "$GITHUB_WORKSPACE/kandelo-postbuild" \
            --tap-root "$GITHUB_WORKSPACE/tap-reviewed" \
            --out-layout "$artifact/layout" \
            --out-receipt "$artifact/receipt.json"

      - name: Upload deterministic Homebrew OCI child
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Upload unprivileged build diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-build-diagnostics-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-bottle/bottles/**
          if-no-files-found: ignore
          retention-days: 14

  upload-bottle:
    needs: [plan, build-and-test]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout exact Kandelo validator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Verify uploader source snapshot
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
        run: |
          set -euo pipefail
          [[ "$KANDELO_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned Kandelo commit"; exit 2;
          }
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::uploader source differs from the validated plan"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download strict build handoff
        id: build-handoff
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff

      - name: Download deterministic Homebrew OCI child
        id: oci-child
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child

      - name: Validate build data before exposing upload credentials
        id: validate-build
        if: ${{ steps.build-handoff.outcome == 'success' && steps.oci-child.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-validated-build.env"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-build-handoff.sh "${validation_args[@]}"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-validated-build.env"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-child \
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout" \
            --receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
          jq -e \
            --arg formula "$FORMULA" \
            --arg arch "$ARCH" \
            --arg abi "${RELEASE_TAG#bottles-abi-v}" \
            --arg tap_repository "$TAP_REPOSITORY" \
            --arg tap_name "$TAP_NAME" \
            --arg tap_commit "$TAP_COMMIT" \
            --arg kandelo_commit "$KANDELO_COMMIT" \
            --arg sha256 "$BOTTLE_SHA256" \
            --arg bytes "$BOTTLE_BYTES" '
              .kind == "child" and .formula == $formula and .arch == $arch and
              .abi == ($abi | tonumber) and
              (.tap_repository | ascii_downcase) == ($tap_repository | ascii_downcase) and
              .tap_name == $tap_name and
              .tap_commit == $tap_commit and .kandelo_commit == $kandelo_commit and
              .bottle.sha256 == $sha256 and .bottle.bytes == ($bytes | tonumber)
            ' "$RUNNER_TEMP/homebrew-oci-child/receipt.json" >/dev/null

      - name: Upload validated bottle in isolated ORAS auth state
        id: upload
        if: ${{ steps.validate-build.outcome == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_PACKAGES_TOKEN || github.token }}
          GHCR_AUTH_MODE: ${{ secrets.HOMEBREW_GITHUB_PACKAGES_TOKEN != '' && 'pat' || 'github-token' }}
          GHCR_REQUIRE_PAT: ${{ inputs.require-github-packages-token }}
          GHCR_USER: ${{ inputs.github-packages-user }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          upload_args=(
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout"
            --layout-receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --out-json "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh "${upload_args[@]}"

      - name: Revalidate upload receipt as data
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          receipt_args=(
            --receipt "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-upload-receipt.sh "${receipt_args[@]}"

      - name: Upload strict upload receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-upload-receipt-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-upload-receipt/receipt.json
          if-no-files-found: error
          retention-days: 2

      - name: Fail when the matching immutable handoff is absent
        if: ${{ always() && (steps.build-handoff.outcome != 'success' || steps.oci-child.outcome != 'success') }}
        shell: bash
        run: |
          echo "::error::the matching build or OCI child handoff was not produced"
          exit 1

  publish-bottle-index:
    needs: [plan, build-and-test, upload-bottle]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.build-and-test.result == 'success' && needs.upload-bottle.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: kandelo-homebrew-bottle-index-${{ inputs.tap-repository }}-${{ matrix.formula }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.formula-matrix) }}
    steps:
      - name: Checkout exact Kandelo index publisher source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download immutable OCI child layouts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: homebrew-oci-child-${{ matrix.formula }}-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-children

      - name: Download public child publication receipts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: homebrew-upload-receipt-${{ matrix.formula }}-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-child-publications

      - name: Validate child layouts and public publication evidence without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free index input validator received $secret_name"; exit 2;
            }
          done
          cd kandelo
          shopt -s nullglob
          child_receipts=("$RUNNER_TEMP"/homebrew-oci-children/*/receipt.json)
          [ "${#child_receipts[@]}" -gt 0 ] || {
            echo "::error::no OCI child receipts were downloaded"; exit 1;
          }
          : >"$RUNNER_TEMP/homebrew-index-child-args.txt"
          for receipt in "${child_receipts[@]}"; do
            child_root="$(dirname "$receipt")"
            arch="$(jq -er '.arch' "$receipt")"
            publication="$RUNNER_TEMP/homebrew-child-publications/homebrew-upload-receipt-${KANDELO_HOMEBREW_FORMULA}-${arch}-attempt-${GITHUB_RUN_ATTEMPT}/receipt.json"
            [ -f "$publication" ] && [ ! -L "$publication" ] || {
              echo "::error::missing public child publication receipt for $arch"; exit 1;
            }
            bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-child \
              --layout "$child_root/layout" --receipt "$receipt"
            bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
              validate-publication-receipt \
              --receipt "$publication" \
              --layout-receipt "$receipt" \
              --kind child \
              --formula "$KANDELO_HOMEBREW_FORMULA" \
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            printf '%s\0%s\0' "$child_root/layout" "$receipt" \
              >>"$RUNNER_TEMP/homebrew-index-child-args.txt"
          done

      - name: Import the existing public Homebrew version index anonymously
        id: existing-index
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::anonymous index import received $secret_name"; exit 2;
            }
          done
          cd kandelo
          first_receipt="$(find "$RUNNER_TEMP/homebrew-oci-children" -mindepth 2 -maxdepth 2 \
            -name receipt.json -type f -print -quit)"
          [ -n "$first_receipt" ] || { echo "::error::missing first child receipt"; exit 1; }
          top_ref="$(jq -er '.top_ref' "$first_receipt")"
          tap_name="$(printf '%s' "$KANDELO_HOMEBREW_TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          remote="ghcr.io/${tap_name}/${KANDELO_HOMEBREW_FORMULA}"
          anonymous_config="$RUNNER_TEMP/homebrew-anonymous-oras.json"
          printf '{"auths":{}}\n' >"$anonymous_config"
          existing="$RUNNER_TEMP/homebrew-existing-index"
          result="$RUNNER_TEMP/homebrew-existing-index-result.json"
          bash scripts/dev-shell.sh env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN python3 \
            scripts/homebrew-oci-layout.py import-public-index \
            --remote "$remote" --reference "$top_ref" \
            --registry-config "$anonymous_config" --out-layout "$existing" \
            --out-result "$result"
          case "$(jq -er '.status' "$result")" in
            present)
              jq -e --arg layout "$existing" '
                keys == ["digest", "layout", "schema", "status"] and
                .schema == 1 and .status == "present" and .layout == $layout and
                (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$"))
              ' "$result" >/dev/null
              echo "layout=$existing" >>"$GITHUB_OUTPUT"
              ;;
            missing)
              jq -e 'keys == ["schema", "status"] and .schema == 1 and .status == "missing"' \
                "$result" >/dev/null
              echo "layout=" >>"$GITHUB_OUTPUT"
              ;;
            *) echo "::error::invalid anonymous Homebrew index import result"; exit 1 ;;
          esac

      - name: Compose one complete Homebrew version index without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_EXISTING_INDEX: ${{ steps.existing-index.outputs.layout }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free index composer received $secret_name"; exit 2;
            }
          done
          cd kandelo
          args=()
          while IFS= read -r -d '' layout && IFS= read -r -d '' receipt; do
            args+=(--child-layout "$layout" --child-receipt "$receipt")
          done <"$RUNNER_TEMP/homebrew-index-child-args.txt"
          [ "${#args[@]}" -gt 0 ] || { echo "::error::no validated OCI children"; exit 1; }
          existing="$KANDELO_HOMEBREW_EXISTING_INDEX"
          [ -z "$existing" ] || args+=(--existing-layout "$existing")
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py merge-index \
            "${args[@]}" \
            --out-layout "$RUNNER_TEMP/homebrew-complete-index/layout" \
            --out-receipt "$RUNNER_TEMP/homebrew-complete-index/layout-receipt.json"

      - name: Publish the complete Homebrew version index in isolated ORAS auth state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_GITHUB_PACKAGES_TOKEN || github.token }}
          GHCR_AUTH_MODE: ${{ secrets.HOMEBREW_GITHUB_PACKAGES_TOKEN != '' && 'pat' || 'github-token' }}
          GHCR_REQUIRE_PAT: ${{ inputs.require-github-packages-token }}
          GHCR_USER: ${{ inputs.github-packages-user }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh \
            --layout "$RUNNER_TEMP/homebrew-complete-index/layout" \
            --layout-receipt "$RUNNER_TEMP/homebrew-complete-index/layout-receipt.json" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --out-json "$RUNNER_TEMP/homebrew-complete-index/transport-receipt.json"

      - name: Upload public Homebrew version-index evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-index-publication-${{ matrix.formula }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/homebrew-complete-index/layout-receipt.json
            ${{ runner.temp }}/homebrew-complete-index/transport-receipt.json
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

  verify-bottle:
    needs: [plan, build-and-test, upload-bottle, publish-bottle-index]
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && needs.build-and-test.result == 'success' && (inputs.dry-run || (needs.upload-bottle.result == 'success' && needs.publish-bottle-index.result == 'success')) && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout exact Kandelo verifier source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact Kandelo sysroot build source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo-sysroot-build
          submodules: false

      - name: Checkout exact tap source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Verify fresh verifier source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          for sha in "$KANDELO_SHA" "$TAP_SHA"; do
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::invalid planned source commit"; exit 2;
            }
          done
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo verifier source differs from the plan"; exit 2;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap verifier source differs from the plan"; exit 2;
          }

      - name: Checkout reviewed Homebrew implementation for bottle verification
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: Homebrew/brew
          ref: 34c40c18ffa2029b611b61c73273e32c003d0842
          path: homebrew-prefix/Homebrew

      - name: Activate reviewed Homebrew implementation for bottle verification
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
        run: |
          set -euo pipefail
          [[ "$HOMEBREW_BREW_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid pinned Homebrew commit"; exit 2;
          }
          brew_prefix="/home/linuxbrew/.linuxbrew"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew verifier checkout differs from the reviewed commit"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::reviewed Homebrew verifier checkout has tracked modifications"; exit 2;
          }
          mkdir -p "$brew_prefix/bin"
          rm -f "$brew_prefix/bin/brew"
          ln -s "$brew_repository/bin/brew" "$brew_prefix/bin/brew"
          brew_bin="$brew_prefix/bin/brew"
          [ "$(readlink -f "$brew_bin")" = "$brew_repository/bin/brew" ] || {
            echo "::error::Homebrew verifier executable differs from the reviewed checkout"; exit 2;
          }
          homebrew_cache="$RUNNER_TEMP/homebrew-verify-cache-${FORMULA}-${ARCH}"
          homebrew_temp="$RUNNER_TEMP/homebrew-verify-temp-${FORMULA}-${ARCH}"
          mkdir -p "$homebrew_cache" "$homebrew_temp"
          {
            echo "HOMEBREW_BREW_FILE=$brew_bin"
            echo "HOMEBREW_BREW_COMMIT=$HOMEBREW_BREW_COMMIT"
            echo "HOMEBREW_CACHE=$homebrew_cache"
            echo "HOMEBREW_TEMP=$homebrew_temp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_INSTALL_CLEANUP=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_DEVELOPER=1"
          } >> "$GITHUB_ENV"
          export HOMEBREW_BREW_FILE="$brew_bin"
          export HOMEBREW_CACHE="$homebrew_cache"
          export HOMEBREW_TEMP="$homebrew_temp"
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          export HOMEBREW_NO_ANALYTICS=1
          export HOMEBREW_DEVELOPER=1
          "$brew_bin" --version
          [ "$("$brew_bin" --prefix)" = "$brew_prefix" ] || {
            echo "::error::Homebrew verifier prefix is not canonical"; exit 2;
          }
          [ "$("$brew_bin" --cellar)" = "$brew_prefix/Cellar" ] || {
            echo "::error::Homebrew verifier cellar is not canonical"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download strict build handoff
        id: build-handoff
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff

      - name: Download deterministic Homebrew OCI child for dry-run validation
        id: oci-child
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child

      - name: Download strict upload receipt
        id: upload-receipt
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-upload-receipt-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-upload-receipt

      - name: Download public Homebrew version-index evidence
        id: index-publication
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-index-publication-${{ matrix.formula }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-index-publication

      - name: Validate build handoff and reconstruct canonical bottle JSON
        if: ${{ steps.build-handoff.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/homebrew-verified-input"
          cd kandelo
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --tap-root "$GITHUB_WORKSPACE/tap"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-verified-input/build.env"
            --out-bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-build-handoff.sh "${validation_args[@]}"

      - name: Create local dry-run upload receipt
        if: ${{ inputs.dry-run && steps.build-handoff.outcome == 'success' && steps.oci-child.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          upload_args=(
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout"
            --layout-receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --out-json "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --dry-run
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh "${upload_args[@]}"

      - name: Validate receipt against exact bottle bytes
        if: ${{ inputs.dry-run || steps.upload-receipt.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          receipt_args=(
            --receipt "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
            --out-bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          )
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            receipt_args+=(--allow-dry-run)
          fi
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-upload-receipt.sh "${receipt_args[@]}"

      - name: Validate exact public Homebrew index traversal without credentials
        if: ${{ !inputs.dry-run && steps.index-publication.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::public Homebrew index verifier received $secret_name"; exit 2;
            }
          done
          cd kandelo
          layout_receipt="$RUNNER_TEMP/homebrew-index-publication/layout-receipt.json"
          transport_receipt="$RUNNER_TEMP/homebrew-index-publication/transport-receipt.json"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
            validate-index-receipt --receipt "$layout_receipt"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
            validate-publication-receipt \
            --receipt "$transport_receipt" \
            --layout-receipt "$layout_receipt" \
            --kind index \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
          tap_name="$(printf '%s' "$KANDELO_HOMEBREW_TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          remote="ghcr.io/${tap_name}/${KANDELO_HOMEBREW_FORMULA}"
          jq -e \
            --slurpfile layout "$layout_receipt" \
            --slurpfile child "$RUNNER_TEMP/homebrew-oci-child/receipt.json" \
            --arg arch "$KANDELO_HOMEBREW_ARCH" \
            '
              ([$layout[0].children[] | select(.arch == $arch)] | length) == 1 and
              ($layout[0].children[] | select(.arch == $arch) |
                .bottle_sha256 == $child[0].bottle.sha256 and
                .manifest_digest == $child[0].oci.manifest.digest and
                .homebrew_ref == $child[0].oci.homebrew_ref)
            ' "$layout_receipt" >/dev/null
          anonymous_config="$RUNNER_TEMP/homebrew-index-anonymous-oras.json"
          printf '{"auths":{}}\n' >"$anonymous_config"
          top_ref="$(jq -er '.top.ref' "$layout_receipt")"
          imported="$RUNNER_TEMP/homebrew-public-index"
          bash scripts/dev-shell.sh env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN oras cp \
            --from-registry-config "$anonymous_config" --to-oci-layout \
            "$remote:$top_ref" "$imported:$top_ref"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-index \
            --layout "$imported" --receipt "$layout_receipt"

      - name: Fail when a required handoff is absent
        if: ${{ always() && (steps.build-handoff.outcome != 'success' || steps.oci-child.outcome != 'success' || (!inputs.dry-run && (steps.upload-receipt.outcome != 'success' || steps.index-publication.outcome != 'success'))) }}
        shell: bash
        run: |
          echo "::error::the build handoff or upload receipt for this matrix entry is absent"
          exit 1

      - name: Build Kandelo sysroot for sidecar evidence
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          expected_sha="$(git -C kandelo rev-parse HEAD)"
          [ "$(git -C kandelo-sysroot-build rev-parse HEAD)" = "$expected_sha" ] || {
            echo "::error::Kandelo sysroot build source differs from the verifier source"; exit 2;
          }
          [ -z "$(git -C kandelo-sysroot-build status --short)" ] || {
            echo "::error::Kandelo sysroot build source is dirty before the build"; exit 2;
          }
          cd kandelo-sysroot-build
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config submodule.musl.url "https://github.com/ifduyue/musl.git"
          fetched=0
          for attempt in 1 2 3; do
            if timeout 180s git submodule update --init --depth 1 libc/musl; then
              fetched=1
              break
            fi
            echo "::warning::libc/musl fetch failed (attempt ${attempt}/3)"
            rm -f .git/index.lock
            find .git/modules -type f -name '*.lock' -delete 2>/dev/null || true
            sleep 10
          done
          [ "$fetched" = "1" ] || {
            echo "::error::failed to fetch libc/musl"; exit 1;
          }
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          case "$KANDELO_HOMEBREW_ARCH" in
            wasm32) ;;
            wasm64)
              bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
              ;;
            *)
              echo "::error::unsupported Kandelo Homebrew architecture: $KANDELO_HOMEBREW_ARCH"
              exit 2
              ;;
          esac

      - name: Build exact Kandelo kernel
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash packages/registry/kernel/build-kernel.sh

      - name: Build exact fork-instrument host tool for bottle tests
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/build-fork-instrument-tool.sh

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd ../apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Prepare the supported interactive browser demo graph
        if: ${{ matrix.formula == 'hello' && matrix.arch == 'wasm32' }}
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh ./run.sh --fetch-only prepare-browser

      - name: Materialize Formula verification platform runtime
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host="$(rustc -vV | sed -n "s/^host: //p")"
            [ -n "$host" ] || {
              echo "unable to resolve the Rust host target" >&2
              exit 2
            }
            for package in dash coreutils grep sed rootfs; do
              cargo run --release -p xtask --target "$host" --quiet -- \
                build-deps --arch wasm32 \
                --binaries-dir "$PWD/binaries" --fetch-only resolve "$package"
            done
            bash scripts/materialize-resolver-binaries.sh "$PWD/binaries"
          '

      - name: Compose only reconstructed bottle metadata into the fresh tap
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          merged_tap="$RUNNER_TEMP/homebrew-merged-tap"
          rm -rf "$merged_tap"
          cp -a "$GITHUB_WORKSPACE/tap" "$merged_tap"
          merge_args=(
            --tap-root "$merged_tap"
            --tap-repository "$TAP_REPOSITORY"
            --tap-name "$TAP_NAME"
            --formula "$FORMULA"
            --arch "$ARCH"
            --release-tag "$RELEASE_TAG"
            --bottle-json "$BOTTLE_JSON"
            --expected-sha256 "$BOTTLE_SHA256"
            --expected-root-url "$BOTTLE_ROOT_URL"
            --expected-cellar "$BOTTLE_RELOCATION_CELLAR"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-merge-bottle-json.sh "${merge_args[@]}"
          changed="$(git -C "$merged_tap" diff --name-only)"
          [ "$changed" = "Formula/$FORMULA.rb" ] || {
            echo "::error::bottle merge changed files outside Formula/$FORMULA.rb"; exit 1;
          }
          [ -z "$(git -C "$GITHUB_WORKSPACE/tap" status --short)" ] || {
            echo "::error::bottle merge modified the archived source tap"; exit 1;
          }

      - name: Select exact anonymous bottle bytes for runtime validation
        shell: bash
        env:
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          bottle_cache="$RUNNER_TEMP/homebrew-bottle-cache"
          runtime_bottle="$bottle_cache/$BOTTLE_FILENAME"
          selection_receipt="$RUNNER_TEMP/homebrew-verified-input/selection-receipt.json"
          mkdir -p "$bottle_cache"
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            cp "$BOTTLE_ARCHIVE" "$runtime_bottle"
            selection_mode="local-dry-run"
            fetch_record="selected local dry-run bottle sha256:$BOTTLE_SHA256"
          else
            verifier_args=(
              --url "$BOTTLE_URL"
              --sha256 "$BOTTLE_SHA256"
              --bytes "$BOTTLE_BYTES"
              --out "$runtime_bottle"
            )
            bash scripts/dev-shell.sh npx tsx scripts/homebrew-verify-public-bottle.ts "${verifier_args[@]}"
            selection_mode="anonymous-public-readback"
            fetch_record="anonymously downloaded $BOTTLE_URL with sha256:$BOTTLE_SHA256"
          fi
          actual_sha="$(sha256sum "$runtime_bottle" | awk '{print $1}')"
          actual_bytes="$(wc -c <"$runtime_bottle" | tr -d '[:space:]')"
          [ "$actual_sha" = "$BOTTLE_SHA256" ] && [ "$actual_bytes" = "$BOTTLE_BYTES" ] || {
            echo "::error::selected runtime bottle differs from the validated receipt"; exit 1;
          }
          jq -nS \
            --arg mode "$selection_mode" \
            --arg url "$BOTTLE_URL" \
            --arg sha256 "$BOTTLE_SHA256" \
            --argjson bytes "$BOTTLE_BYTES" \
            --arg fetch "$fetch_record" \
            '{schema: 1, status: "success", bottle: {
              mode: $mode, url: $url, sha256: $sha256, bytes: $bytes
            }, fetch: [$fetch]}' >"$selection_receipt"
          {
            printf 'RUNTIME_BOTTLE=%q\n' "$runtime_bottle"
            printf 'BOTTLE_CACHE=%q\n' "$bottle_cache"
            printf 'SELECTION_RECEIPT=%q\n' "$selection_receipt"
          } >"$RUNNER_TEMP/homebrew-verified-input/runtime.env"

      - name: Create isolated bottle verification identity
        id: verifier-identity
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-verify"
          build_home="/home/$build_user"
          sudo_bin="/usr/bin/sudo"
          systemd_run_bin="/usr/bin/systemd-run"
          systemctl_bin="/usr/bin/systemctl"
          getent_bin="/usr/bin/getent"
          findmnt_bin="/usr/bin/findmnt"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          useradd_bin="/usr/sbin/useradd"
          sudo_mode="$(stat -c '%a' "$sudo_bin" 2>/dev/null || true)"
          if [ ! -f "$sudo_bin" ] || [ -L "$sudo_bin" ] || [ ! -x "$sudo_bin" ] || \
             [ "$(stat -c '%u' "$sudo_bin" 2>/dev/null || true)" != "0" ] || \
             ! [[ "$sudo_mode" =~ ^[0-7]{3,4}$ ]] || \
             [ $((8#$sudo_mode & 0022)) -ne 0 ]; then
            echo "::error::runner sudo boundary is unavailable"; exit 2
          fi
          for protected_bin in "$systemd_run_bin" "$systemctl_bin" "$getent_bin" "$findmnt_bin" "$pgrep_bin" \
            "$useradd_bin"; do
            protected_mode="$(stat -c '%a' "$protected_bin" 2>/dev/null || true)"
            if [ ! -f "$protected_bin" ] || [ -L "$protected_bin" ] || \
               [ ! -x "$protected_bin" ] || \
               [ "$(stat -c '%u' "$protected_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$protected_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$protected_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier process boundary is unavailable: $protected_bin"; exit 2
            fi
          done
          pkill_target="$(readlink -f -- "$pkill_bin" 2>/dev/null || true)"
          pkill_parent="$(dirname "$pkill_bin")"
          pkill_parent_mode="$(stat -c '%a' "$pkill_parent" 2>/dev/null || true)"
          if [ -L "$pkill_bin" ]; then
            if [ "$pkill_target" != "$pgrep_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               [ "$(stat -c '%u' "$pkill_parent" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_parent_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_parent_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier pkill boundary is unavailable"; exit 2
            fi
          else
            pkill_mode="$(stat -c '%a' "$pkill_bin" 2>/dev/null || true)"
            if [ ! -f "$pkill_bin" ] || [ ! -x "$pkill_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier pkill boundary is unavailable"; exit 2
            fi
          fi
          [ -d /run/systemd/system ] || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$sudo_bin" -n true || {
            echo "::error::runner cannot establish the privileged verifier boundary"; exit 2;
          }
          "$sudo_bin" -n -- "$systemctl_bin" show --property=Version --value >/dev/null || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$systemd_run_bin" --help | grep -F -- '--expand-environment=' >/dev/null || {
            echo "::error::runner systemd cannot preserve exact Brew arguments"; exit 2;
          }
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::reserved bottle verifier user already exists"; exit 2
          fi
          "$sudo_bin" -n -- "$useradd_bin" --system --user-group --create-home \
            --home-dir "$build_home" --shell /usr/sbin/nologin "$build_user"
          echo "created=true" >> "$GITHUB_OUTPUT"
          [ "$(id -u "$build_user")" != "$(id -u)" ] || {
            echo "::error::bottle verifier identity is not isolated"; exit 2;
          }
          if "$sudo_bin" -n -u "$build_user" -- "$sudo_bin" -n true >/dev/null 2>&1; then
            echo "::error::bottle verifier identity unexpectedly has sudo access"; exit 2
          fi
          shared_temp="$(mktemp -d /tmp/kandelo-homebrew-verify.XXXXXX)"
          "$sudo_bin" chown root:root "$shared_temp"
          "$sudo_bin" chmod 1777 "$shared_temp"
          mkdir "$shared_temp/cache" "$shared_temp/tmp"
          {
            echo "KANDELO_HOMEBREW_BUILD_USER=$build_user"
            echo "KANDELO_HOMEBREW_SHARED_TEMP=$shared_temp"
            echo "KANDELO_HOMEBREW_SUDO_BIN=$sudo_bin"
            echo "KANDELO_HOMEBREW_SYSTEMD_RUN_BIN=$systemd_run_bin"
            echo "KANDELO_HOMEBREW_SYSTEMCTL_BIN=$systemctl_bin"
            echo "KANDELO_HOMEBREW_GETENT_BIN=$getent_bin"
            echo "KANDELO_HOMEBREW_PGREP_BIN=$pgrep_bin"
            echo "KANDELO_HOMEBREW_PKILL_BIN=$pkill_bin"
            echo "HOMEBREW_CACHE=$shared_temp/cache"
            echo "HOMEBREW_TEMP=$shared_temp/tmp"
          } >> "$GITHUB_ENV"

      - name: Provision Formula browser runtime for bottle verification
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_SHARED_TEMP="$KANDELO_HOMEBREW_SHARED_TEMP" \
            KANDELO_HOMEBREW_BUILD_USER="$KANDELO_HOMEBREW_BUILD_USER" \
            KANDELO_HOMEBREW_SUDO_BIN="$KANDELO_HOMEBREW_SUDO_BIN" \
            bash -c '
              set -euo pipefail
              node_bin="$(command -v node)"
              case "$node_bin" in
                /nix/store/*/bin/node) ;;
                *)
                  echo "Formula browser provisioning resolved an undeclared Node: $node_bin" >&2
                  exit 2
                  ;;
              esac
              bash scripts/homebrew-provision-formula-browser.sh \
                --shared-temp "$KANDELO_HOMEBREW_SHARED_TEMP" \
                --build-user "$KANDELO_HOMEBREW_BUILD_USER" \
                --sudo-bin "$KANDELO_HOMEBREW_SUDO_BIN" \
                --node-bin "$node_bin" \
                --browser-app "$PWD/apps/browser-demos"
            '

      - name: Force-pour and test the exact selected bottle without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_RELEASE_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free bottle verifier received $secret_name"; exit 2;
            }
          done
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          runtime_evidence="$RUNNER_TEMP/homebrew-runtime-evidence/runtime-evidence.json"
          workflow_command_token="$(/usr/bin/od -An -N32 -tx1 /dev/urandom | /usr/bin/tr -d ' \n')"
          [[ "$workflow_command_token" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::could not create the verifier workflow-command boundary"; exit 2;
          }
          workflow_commands_stopped=0
          resume_workflow_commands() {
            if [ "$workflow_commands_stopped" = "1" ]; then
              printf '::%s::\n' "$workflow_command_token"
              workflow_commands_stopped=0
            fi
          }
          restore_workflow_commands_on_exit() {
            status="$?"
            set +e
            resume_workflow_commands
            exit "$status"
          }
          trap restore_workflow_commands_on_exit EXIT
          workflow_commands_stopped=1
          printf '::stop-commands::%s\n' "$workflow_command_token"
          bash scripts/dev-shell.sh bash scripts/homebrew-verify-poured-bottle.sh \
            --tap-root "$RUNNER_TEMP/homebrew-merged-tap" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --abi "$KANDELO_HOMEBREW_RELEASE_ABI" \
            --bottle "$RUNTIME_BOTTLE" \
            --bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json" \
            --bottle-url "$BOTTLE_URL" \
            --bottle-sha256 "$BOTTLE_SHA256" \
            --bottle-bytes "$BOTTLE_BYTES" \
            --bottle-root-url "$BOTTLE_ROOT_URL" \
            --dependency-provenance "$DEPENDENCY_PROVENANCE" \
            --selection-receipt "$SELECTION_RECEIPT" \
            --sysroot-build-root "$GITHUB_WORKSPACE/kandelo-sysroot-build" \
            --out "$runtime_evidence"
          resume_workflow_commands
          trap - EXIT

      - name: Retire isolated bottle verification identity
        if: ${{ always() && steps.verifier-identity.outputs.created == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-verify"
          build_uid="$(id -u "$build_user")"
          sudo_bin="/usr/bin/sudo"
          systemctl_bin="/usr/bin/systemctl"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          userdel_bin="/usr/sbin/userdel"
          slice="kandelo-homebrew-build-${build_uid}.slice"
          uid_has_processes() {
            local status
            if "$sudo_bin" -n -- "$pgrep_bin" -u "$build_uid" >/dev/null 2>&1; then
              return 0
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && return 1
            echo "::error::could not inspect bottle verifier processes"
            return 2
          }
          "$sudo_bin" -n -- "$systemctl_bin" stop "$slice" >/dev/null 2>&1 || true
          "$sudo_bin" -n -- "$pkill_bin" -TERM -u "$build_uid" >/dev/null 2>&1 || true
          for ((attempt = 0; attempt < 50; attempt++)); do
            if uid_has_processes; then sleep 0.1; continue; else status="$?"; fi
            [ "$status" -eq 1 ] && break
            exit "$status"
          done
          if uid_has_processes; then
            "$sudo_bin" -n -- "$pkill_bin" -KILL -u "$build_uid" >/dev/null 2>&1 || true
            sleep 1
          else
            status="$?"; [ "$status" -eq 1 ] || exit "$status"
          fi
          if uid_has_processes; then
            echo "::error::bottle verifier identity still owns live processes"; exit 1
          else
            status="$?"; [ "$status" -eq 1 ] || exit "$status"
          fi
          "$sudo_bin" -n -- "$userdel_bin" -r "$build_user"
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::bottle verifier identity still exists after retirement"; exit 1
          fi

      - name: Checkout exact post-verification Kandelo generator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
