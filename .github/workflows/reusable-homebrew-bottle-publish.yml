      - name: Boot an exact dependency-bearing Brewfile image on Node and Chromium
        shell: bash
        env:
          KANDELO_HOMEBREW_ACCEPTANCE_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_ACCEPTANCE_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_ACCEPTANCE_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED: ${{ inputs.require-vfs-acceptance }}
        run: |
          set -euo pipefail
          case "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" in
            true|false) ;;
            *) echo "::error::require-vfs-acceptance must be true or false"; exit 2 ;;
          esac
          tap_root="$(realpath "$GITHUB_WORKSPACE/tap-postverify")"
          policy_dir="$GITHUB_WORKSPACE/tap-postverify/Kandelo"
          if [ -L "$policy_dir" ] || { [ -e "$policy_dir" ] && [ ! -d "$policy_dir" ]; }; then
            echo "::error::tap Kandelo policy path must be a real directory"; exit 2
          fi
          config_candidate="$policy_dir/vfs-acceptance.json"
          if [ ! -e "$config_candidate" ] && [ ! -L "$config_candidate" ]; then
            if [ "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" = "true" ]; then
              echo "::error::required dependency-bearing VFS acceptance selection disappeared after planning"
              exit 1
            fi
            echo "::notice::tap has no dependency-bearing VFS acceptance selection; no closure acceptance evidence was produced"
            exit 0
          fi
          [ -f "$config_candidate" ] && [ ! -L "$config_candidate" ] || {
            echo "::error::tap VFS acceptance configuration must be a regular non-symlink file"; exit 2;
          }
          config="$(realpath "$config_candidate")"
          case "$config" in
            "$tap_root"/*) ;;
            *) echo "::error::tap VFS acceptance configuration resolved outside the exact tap checkout"; exit 2 ;;
          esac
          jq -e '
            type == "object" and
            keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema"] and
            .schema == 1 and
            (.formula | type == "string" and test("^[a-z0-9][a-z0-9._-]*$")) and
            (.brewfile | type == "string" and length > 0 and length <= 255) and
            (.executable | type == "string" and test("^/([A-Za-z0-9._@%+=:-]+/)*[A-Za-z0-9._@%+=:-]+$")) and
            (.argv | type == "array" and length > 0 and length <= 64 and all(.[];
              type == "string" and length > 0 and length <= 4096 and contains("\u0000") == false) and
              (tojson | utf8bytelength <= 16384)) and
            (.expected_stdout | type == "string" and length > 0 and length <= 4096 and
              contains("\u0000") == false and contains("\u000a") == false and
              contains("\u000d") == false)
          ' "$config" >/dev/null || {
            echo "::error::tap VFS acceptance configuration is invalid"; exit 2;
          }
          selected_formula="$(jq -er '.formula' "$config")"
          if [ "$selected_formula" != "$KANDELO_HOMEBREW_ACCEPTANCE_FORMULA" ] || \
             [ "$KANDELO_HOMEBREW_ACCEPTANCE_ARCH" != "wasm32" ]; then
            echo "VFS acceptance belongs to ${selected_formula}/wasm32, not this matrix entry."
            exit 0
          fi
          if [ "$KANDELO_HOMEBREW_ACCEPTANCE_DRY_RUN" = "true" ]; then
            if [ "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" = "true" ]; then
              echo "::error::required dependency-bearing VFS acceptance cannot run in dry-run mode"
              exit 1
            fi
            echo "::notice::dependency-bearing VFS acceptance requires anonymous reads of published GHCR bottles; no closure acceptance evidence was produced"
            exit 0
          fi

          cd kandelo
          rm -rf host/dist
          acceptance_root="$RUNNER_TEMP/homebrew-vfs-acceptance"
          acceptance_tap="$acceptance_root/tap"
          public_dir="$GITHUB_WORKSPACE/kandelo/apps/browser-demos/public/__kandelo-acceptance"
          image="$acceptance_root/homebrew-brewfile.vfs.zst"
          report="$acceptance_root/homebrew-brewfile-report.json"
          node_evidence="$acceptance_root/node-evidence.json"
          browser_evidence="$acceptance_root/browser-evidence.json"
          playwright_report="$acceptance_root/playwright-report.json"
          mkdir -p "$acceptance_root" "$public_dir"
          cp -a "$GITHUB_WORKSPACE/tap-postverify" "$acceptance_tap"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Formula/" "$acceptance_tap/Formula/"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Kandelo/" "$acceptance_tap/Kandelo/"

          brewfile_rel="$(jq -er '.brewfile' "$config")"
          case "$brewfile_rel" in
            /*|../*|*/../*|*/..) echo "::error::Brewfile path escapes the tap"; exit 2 ;;
          esac
          brewfile_candidate="$GITHUB_WORKSPACE/tap-postverify/$brewfile_rel"
          [ -f "$brewfile_candidate" ] && [ ! -L "$brewfile_candidate" ] || {
            echo "::error::tap VFS acceptance Brewfile must be a regular non-symlink file"; exit 2;
          }
          brewfile="$(realpath "$brewfile_candidate")"
          case "$brewfile" in
            "$tap_root"/*) ;;
            *) echo "::error::Brewfile resolved outside the exact tap checkout"; exit 2 ;;
          esac

          base_image="$(bash scripts/resolve-binary.sh programs/rootfs.vfs)"
          kernel="$(bash scripts/resolve-binary.sh kernel.wasm)"
          case "$base_image" in
            "$PWD/binaries"/*) ;;
            *) echo "::error::platform base did not resolve from the Kandelo package registry tree"; exit 2 ;;
          esac
          case "$kernel" in
            "$PWD/local-binaries"/*) ;;
            *) echo "::error::verification kernel did not resolve from the exact worktree build"; exit 2 ;;
          esac

          vfs_args=(
            --metadata "$acceptance_tap/Kandelo/metadata.json"
            --tap-root "$acceptance_tap"
            --brewfile "$brewfile"
            --arch wasm32
            --runtime node
            --base-image "$base_image"
            --out "$image"
            --report "$report"
            --bottle-cache "$RUNNER_TEMP/homebrew-bottle-cache"
            --no-fallback
          )
          bash scripts/dev-shell.sh npx tsx \
            images/vfs/scripts/build-homebrew-vfs-image.ts "${vfs_args[@]}"

          executable="$(jq -er '.executable' "$config")"
          argv_json="$(jq -c '.argv' "$config")"
          expected_stdout="$(jq -er '.expected_stdout' "$config")"
          node_args=(
            --metadata "$acceptance_tap/Kandelo/metadata.json"
            --tap-root "$acceptance_tap"
            --brewfile "$brewfile"
            --base-image "$base_image"
            --base-origin kandelo-package-registry
            --image "$image"
            --report "$report"
            --kernel "$kernel"
            --kernel-origin worktree-build
            --formula "$selected_formula"
            --executable "$executable"
            --argv-json "$argv_json"
            --expect-stdout "$expected_stdout"
            --evidence "$node_evidence"
          )
          bash scripts/dev-shell.sh npx tsx \
            scripts/homebrew-vfs-acceptance-smoke.ts "${node_args[@]}"

          image_sha256="$(sha256sum "$image" | awk '{print $1}')"
          kernel_sha256="$(sha256sum "$kernel" | awk '{print $1}')"
          [ "$(jq -er '.image.sha256' "$node_evidence")" = "$image_sha256" ] || {
            echo "::error::Node evidence did not bind the composed image"; exit 1;
          }
          cp "$image" "$public_dir/homebrew-brewfile.vfs.zst"
          browser_port="${KANDELO_PLAYWRIGHT_PORT:-5401}"
          browser_url="http://127.0.0.1:${browser_port}/__kandelo-acceptance/homebrew-brewfile.vfs.zst"
          (
            cd apps/browser-demos
            npx playwright install chromium --with-deps
            export KANDELO_PLAYWRIGHT_PORT="$browser_port"
            export KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL="$browser_url"
            export KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256="$image_sha256"
            export KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256="$kernel_sha256"
            export KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE="$executable"
            export KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON="$argv_json"
            export KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT="$expected_stdout"
            export KANDELO_BROWSER_DEMO_INPUTS="homebrew-vfs-test"
            bash ../../scripts/dev-shell.sh env \
              KANDELO_PLAYWRIGHT_PORT="$KANDELO_PLAYWRIGHT_PORT" \
              KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL="$KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL" \
              KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256="$KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256" \
              KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256="$KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256" \
              KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE="$KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE" \
              KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON="$KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON" \
              KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT="$KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT" \
              KANDELO_BROWSER_DEMO_INPUTS="$KANDELO_BROWSER_DEMO_INPUTS" \
              npx playwright test test/homebrew-brewfile-vfs.spec.ts \
                --project=chromium --reporter=json >"$playwright_report"
          )
          jq -e '
            .stats.expected == 1 and .stats.unexpected == 0 and
            .stats.flaky == 0 and .stats.skipped == 0
          ' "$playwright_report" >/dev/null || {
            echo "::error::exact-byte Chromium Homebrew VFS smoke did not report one pass"; exit 1;
          }
          jq -nS \
            --arg image_sha256 "$image_sha256" \
            --arg kernel_sha256 "$kernel_sha256" \
            --arg executable "$executable" \
            --argjson argv "$argv_json" \
            '{schema: 1, status: "success", runtime: "browser", engine: "chromium",
              image_sha256: $image_sha256, kernel_sha256: $kernel_sha256,
              executable: $executable, argv: $argv}' >"$browser_evidence"

      - name: Validate generated sidecars against the exact base tap
        shell: bash
        run: |
          set -euo pipefail
          validation_tap="$RUNNER_TEMP/homebrew-validation-tap"
          cp -a "$GITHUB_WORKSPACE/tap-postverify" "$validation_tap"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Formula/" "$validation_tap/Formula/"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Kandelo/" "$validation_tap/Kandelo/"
          cd kandelo-postverify
          host="$(bash scripts/dev-shell.sh rustc -vV | awk '/^host/ {print $2}')"
          validation_args=(
            cargo run --release -p xtask --target "$host" --quiet --
            homebrew-validate --tap-root "$validation_tap"
          )
          bash scripts/dev-shell.sh "${validation_args[@]}"

      - name: Recheck trusted verifier sources after runtime execution
        shell: bash
        env:
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo verifier source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed Kandelo tracked files"; exit 1;
          }
          [ "$(git -C kandelo-sysroot-build rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo sysroot build source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo-sysroot-build status --short --untracked-files=no --ignore-submodules=all)" ] || {
            echo "::error::runtime validation modified Kandelo sysroot build files outside musl"; exit 1;
          }
          expected_musl_sha="$(git -C kandelo-sysroot-build rev-parse HEAD:libc/musl)"
          [ "$(git -C kandelo-sysroot-build/libc/musl rev-parse HEAD)" = "$expected_musl_sha" ] || {
            echo "::error::Kandelo sysroot build moved the reviewed musl commit"; exit 1;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap verifier source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C tap status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed tap tracked files"; exit 1;
          }
          [ "$(git -C kandelo-postverify rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::fresh Kandelo generator source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo-postverify status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified fresh Kandelo generator files"; exit 1;
          }
          [ "$(git -C tap-postverify rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::fresh tap source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C tap-postverify status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified fresh tap files"; exit 1;
          }
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::reviewed Homebrew source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed Homebrew source"; exit 1;
          }

      - name: Package validated data-only publication handoff
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          publish_handoff="$RUNNER_TEMP/homebrew-publish-handoff"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          mkdir -p "$publish_handoff/build" "$publish_handoff/composition"
          cp "$RUNNER_TEMP/homebrew-build-handoff/manifest.json" "$publish_handoff/build/manifest.json"
          cp "$RUNNER_TEMP/homebrew-build-handoff/bottle.json" "$publish_handoff/build/bottle.json"
          cp "$RUNNER_TEMP/homebrew-build-handoff/dependency-provenance.json" \
            "$publish_handoff/build/dependency-provenance.json"
          cp "$RUNTIME_BOTTLE" "$publish_handoff/build/bottle.tar.gz"
          cp "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json" "$publish_handoff/receipt.json"
          jq -e '
            (.packages | length) == 1 and
            (.packages[0].bottles | length) == 1
          ' "$RUNNER_TEMP/homebrew-sidecars/sidecars-input.json" >/dev/null
          jq -S '
            .packages[0].bottles[0].bottle_file = "../build/bottle.tar.gz"
          ' "$RUNNER_TEMP/homebrew-sidecars/sidecars-input.json" \
            >"$publish_handoff/composition/sidecars-input.json"
          cd kandelo-postverify
          payload_args=(
            --handoff "$publish_handoff"
            --tap-root "$GITHUB_WORKSPACE/tap-postverify"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
          )
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            payload_args+=(--allow-dry-run)
          fi
          bash scripts/dev-shell.sh bash scripts/homebrew-validate-publish-handoff.sh "${payload_args[@]}"

      - name: Upload validated publication handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-publish-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-publish-handoff
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Upload read-only verification diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-verification-diagnostics-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/homebrew-browser-gallery/**
            ${{ runner.temp }}/homebrew-browser-vfs/**
            ${{ runner.temp }}/homebrew-vfs-acceptance/**
            ${{ runner.temp }}/homebrew-sidecars/Kandelo/**
          if-no-files-found: ignore
          retention-days: 14

  finalize-tap:
    needs: [plan, build-and-test, upload-bottle, verify-bottle]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout exact Kandelo finalizer source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact base tap without credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-base

      - name: Verify finalizer source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo finalizer source differs from the plan"; exit 2;
          }
          [ "$(git -C tap-base rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap finalizer base differs from the plan"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download validated publication handoff
        id: publish-handoff
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-publish-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-publish-handoff

      - name: Validate the complete data-only publication payload
        id: validate-payload
        if: ${{ steps.publish-handoff.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          error_file="$RUNNER_TEMP/homebrew-finalize-error.txt"
          : >"$error_file"
          {
            cd kandelo
            payload_args=(
              --handoff "$RUNNER_TEMP/homebrew-publish-handoff"
              --tap-root "$GITHUB_WORKSPACE/tap-base"
              --formula "$KANDELO_HOMEBREW_FORMULA"
              --arch "$KANDELO_HOMEBREW_ARCH"
              --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
              --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
              --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
              --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
              --forbidden-root "$GITHUB_WORKSPACE"
              --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
              --forbidden-root "$RUNNER_TEMP"
              --forbidden-root "/home/kandelo-homebrew-build"
            )
            bash scripts/dev-shell.sh bash scripts/homebrew-validate-publish-handoff.sh "${payload_args[@]}"

          } 2> >(tee "$error_file" >&2)

      - name: Checkout tap publication branch after payload validation
        if: ${{ steps.validate-payload.outcome == 'success' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: main
          path: tap-publish
          fetch-depth: 0

      - name: Publish validated sidecars under the tap state lock
        id: publish
        if: ${{ steps.validate-payload.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          STATE_LOCK_OWNER_DETAIL: ${{ matrix.formula }}, ${{ matrix.arch }}
        run: |
          set -euo pipefail
          error_file="$RUNNER_TEMP/homebrew-finalize-error.txt"
          {
            cd kandelo
            publish_args=(
              --tap-root "$GITHUB_WORKSPACE/tap-publish"
              --publication-handoff "$RUNNER_TEMP/homebrew-publish-handoff"
              --formula "$KANDELO_HOMEBREW_FORMULA"
              --arch "$KANDELO_HOMEBREW_ARCH"
              --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
              --status success
              --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
              --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            )
            bash scripts/dev-shell.sh bash scripts/homebrew-publish-sidecars.sh "${publish_args[@]}"
          } 2> >(tee -a "$error_file" >&2)

      - name: Checkout clean tap for a failed-attempt report
        if: ${{ always() && (steps.publish-handoff.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: main
          path: tap-report
          fetch-depth: 0

      - name: Record failed attempt without replacing last-green metadata
        if: ${{ always() && (steps.publish-handoff.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          PUBLISH_HANDOFF_OUTCOME: ${{ steps.publish-handoff.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
          STATE_LOCK_OWNER_DETAIL: ${{ matrix.formula }}, ${{ matrix.arch }}
          VALIDATE_PAYLOAD_OUTCOME: ${{ steps.validate-payload.outcome }}
        run: |
          set -euo pipefail
          error_text="publish-handoff=$PUBLISH_HANDOFF_OUTCOME; validate-payload=$VALIDATE_PAYLOAD_OUTCOME; publish=$PUBLISH_OUTCOME"
          cd kandelo
          report_args=(
            --tap-root "$GITHUB_WORKSPACE/tap-report"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --status failed
            --error "$error_text"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-publish-sidecars.sh "${report_args[@]}"

      - name: Fail after reporting an unsuccessful matrix entry
        if: ${{ always() && (steps.publish-handoff.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        shell: bash
        run: exit 1
