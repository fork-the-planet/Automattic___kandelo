name: Detect change scope
description: |
  Compute effect-based CI scope flags from the diff vs a base ref.
  Used by staging-build.yml and prepare-merge.yml to gate package
  staging, binary materialization, and test suites.

  Scopes:

    docs_only — every changed file is in the docs/meta allowlist
      (docs/, top-level *.md, LICENSE, COPYING*, .gitignore et al, the
      docs workflow files, benchmarks/results/).
      When true, every test step skips.

    package_archive_changed — at least one changed file can alter
      built package archive bytes or package cache keys, including
      package build composite actions and paths declared in
      packages/registry/*/build.toml inputs. This is the only category
      that requires the package matrix.

    package_publish_flow_changed — package release/index/source-publish
      mechanics changed. This runs publish-flow checks without
      rebuilding every archive.

    binary_materialization_changed — binary fetch, verification,
      overlay, or install logic changed. This runs materialization
      checks, materializes durable binaries, and runs runtime tests,
      but does not rebuild archives.

    kernel_runtime_changed — kernel, host runtime, sysroot, test
      runner, or conformance inputs changed. Gates fresh kernel/runtime
      validation against existing package archives.

    package_staging_required — compatibility alias for
      package_archive_changed. Ordinary kernel/runtime changes do not
      set it unless a package declares the changed path as a build
      input. Binary fetch, additive ABI snapshot, package-owned
      test/demo, advisory package set, browser demo app, outer CI
      workflow/control-action, and docs-only changes do not set it.

  Filters fail safe for expensive package work: an unknown path
  outside the docs allowlist runs the non-package test gate, but it
  does not rebuild package archives unless it matches the
  package_archive category.

inputs:
  base-ref:
    description: |
      Base ref to diff against. Three-dot diff (`base...HEAD`) so
      that callers can run this either pre-merge (HEAD = PR HEAD,
      diff = PR's contribution since branch point) or post-merge
      (HEAD = merge commit, diff = PR's net contribution; `base`
      is a direct parent so three-dot reduces to two-dot).
    default: origin/main
  fetch-base:
    description: |
      Whether to `git fetch` the base ref before diffing. Set to
      'false' when the workflow already has it locally (e.g. after
      an in-memory merge that fetched main first, or after
      actions/checkout with fetch-depth: 0 which fetches all
      branches).
    default: 'true'

outputs:
  package_archive_changed:
    description: |
      'true' when at least one changed path can affect package archive
      bytes or package cache keys.
    value: ${{ steps.scope.outputs.package_archive_changed }}
  package_publish_flow_changed:
    description: |
      'true' when package release/index/source-publish machinery changed.
    value: ${{ steps.scope.outputs.package_publish_flow_changed }}
  binary_materialization_changed:
    description: |
      'true' when binary fetch, verification, overlay, or install logic changed.
    value: ${{ steps.scope.outputs.binary_materialization_changed }}
  kernel_runtime_changed:
    description: |
      'true' when kernel/runtime/test-runner inputs changed.
    value: ${{ steps.scope.outputs.kernel_runtime_changed }}
  test_gate_required:
    description: |
      'true' when non-package-matrix validation is required.
    value: ${{ steps.scope.outputs.test_gate_required }}
  kernel:
    description: |
      Compatibility output for test-suite filtering: 'true' when the
      diff should run kernel-only suites (kernel runtime or CI scope
      control changed).
    value: ${{ steps.scope.outputs.kernel }}
  docs_only:
    description: |
      'true' when every changed path is in the docs/meta allowlist.
      Gates the prereq kernel build + vitest.
    value: ${{ steps.scope.outputs.docs_only }}
  package_staging_required:
    description: |
      Compatibility alias for package_archive_changed.
    value: ${{ steps.scope.outputs.package_staging_required }}
  package_staging_reason:
    description: |
      Human-readable explanation of why package staging is required
      or why it was skipped.
    value: ${{ steps.scope.outputs.package_staging_reason }}

runs:
  using: composite
  steps:
    - id: scope
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
        FETCH_BASE: ${{ inputs.fetch-base }}
      run: |
        set -eo pipefail

        if [ "$FETCH_BASE" = 'true' ]; then
          remote_branch="${BASE_REF#origin/}"
          if [ "$remote_branch" != "$BASE_REF" ]; then
            git fetch origin "+refs/heads/$remote_branch:refs/remotes/origin/$remote_branch" --no-tags
          else
            git fetch origin "$BASE_REF" --no-tags
          fi
        fi

        diff_range="$BASE_REF...HEAD"
        if ! files=$(git diff --name-only "$diff_range" 2>/tmp/detect-change-scope.diff.err); then
          echo "::warning::three-dot diff against $BASE_REF failed; falling back to two-dot diff"
          cat /tmp/detect-change-scope.diff.err >&2 || true
          diff_range="$BASE_REF..HEAD"
          files=$(git diff --name-only "$diff_range")
        fi
        echo "Changed files vs $BASE_REF:"
        echo "$files" | sed 's/^/  /'

        summarize_matches() {
          local label="$1"
          local matches="$2"
          local count first_matches
          count=$(printf '%s\n' "$matches" | sed '/^$/d' | wc -l | tr -d ' ')
          if [ "$count" -eq 0 ]; then
            printf '%s: none' "$label"
            return
          fi
          first_matches=$(printf '%s\n' "$matches" | sed '/^$/d' | head -n 3 | tr '\n' ',' | sed 's/,$//; s/,/, /g')
          if [ "$count" -gt 3 ]; then
            printf '%s: %s (+%s more)' "$label" "$first_matches" "$((count - 3))"
          else
            printf '%s: %s' "$label" "$first_matches"
          fi
        }

        emit_bool() {
          local name="$1"
          local value="$2"
          echo "$name=$value" >> "$GITHUB_OUTPUT"
        }

        bool_for_matches() {
          local matches="$1"
          if [ -n "$(printf '%s\n' "$matches" | sed '/^$/d')" ]; then
            printf 'true'
          else
            printf 'false'
          fi
        }

        action_dir="${GITHUB_ACTION_PATH:-.github/actions/detect-change-scope}"
        . "$action_dir/ci-scope-paths.sh"
        package_archive_files=$(printf '%s\n' "$files" | package_archive_changed_files)
        package_publish_flow_files=$(printf '%s\n' "$files" | package_publish_flow_changed_files)
        binary_materialization_files=$(printf '%s\n' "$files" | binary_materialization_changed_files)
        kernel_runtime_files=$(printf '%s\n' "$files" | kernel_runtime_changed_files)
        ci_control_files=$(printf '%s\n' "$files" | ci_control_changed_files)

        # Tier A — docs-only filter. Implemented as inverse: any file
        # outside the docs allowlist forces docs_only=false. Empty diff
        # is treated as docs_only=false (defensive — a real PR will
        # never have an empty diff, so an empty result indicates
        # something unexpected and we don't want to skip silently).
        non_docs=$(echo "$files" | grep -vE \
          -e '^docs/' \
          -e '^[^/]+\.md$' \
          -e '^(LICENSE|COPYING|COPYING\.runtime)$' \
          -e '^\.(gitignore|gitattributes|editorconfig)$' \
          -e '^\.github/workflows/docs\.yml$' \
          -e '^benchmarks/results/' \
          || true)

        all_scoped_files=$(printf '%s\n%s\n%s\n%s\n%s\n' \
          "$package_archive_files" \
          "$package_publish_flow_files" \
          "$binary_materialization_files" \
          "$kernel_runtime_files" \
          "$ci_control_files" \
          | sed '/^$/d' | sort -u)
        uncategorized_non_docs_files=$(comm -23 \
          <(printf '%s\n' "$non_docs" | sed '/^$/d' | sort -u) \
          <(printf '%s\n' "$all_scoped_files") \
          || true)

        if printf '%s\n' "$files" | grep -qx 'crates/shared/src/lib.rs' &&
           git diff -U0 "$diff_range" -- crates/shared/src/lib.rs \
             | grep -E '^[+-][[:space:]]*pub const ABI_VERSION: u32 = [0-9]+' >/dev/null; then
          package_archive_files=$(printf '%s\n%s\n' "$package_archive_files" 'crates/shared/src/lib.rs (ABI_VERSION)' | sed '/^$/d')
        fi

        if [ -z "$files" ]; then
          package_archive_changed=true
          package_staging_reason='Empty diff; package staging required as a fail-safe.'
          package_staging_state='will run - empty diff fail-safe'
        else
          package_archive_changed=$(bool_for_matches "$package_archive_files")
          if [ "$package_archive_changed" = 'true' ]; then
            package_staging_reason="$(summarize_matches 'Package archive changes' "$package_archive_files")"
            package_staging_state='will run'
          else
            package_staging_reason='No package archive/cache-key changes; package staging skipped.'
            package_staging_state='skip - no package archive changes'
          fi
        fi

        package_publish_flow_changed=$(bool_for_matches "$package_publish_flow_files")
        binary_materialization_changed=$(bool_for_matches "$binary_materialization_files")
        kernel_runtime_changed=$(bool_for_matches "$kernel_runtime_files")
        ci_control_changed=$(bool_for_matches "$ci_control_files")
        uncategorized_non_docs_changed=$(bool_for_matches "$uncategorized_non_docs_files")

        if [ "$kernel_runtime_changed" = 'true' ] || [ "$ci_control_changed" = 'true' ]; then
          kernel_changed=true
          kernel_state='will run'
        else
          kernel_changed=false
          kernel_state="skip — $BASE_REF is the known-good baseline"
        fi

        if [ "$kernel_changed" = 'true' ] ||
           [ "$binary_materialization_changed" = 'true' ] ||
           [ "$package_publish_flow_changed" = 'true' ] ||
           [ "$uncategorized_non_docs_changed" = 'true' ]; then
          test_gate_required=true
        else
          test_gate_required=false
        fi
        if [ -z "$files" ]; then
          test_gate_required=true
        fi

        emit_bool package_archive_changed "$package_archive_changed"
        emit_bool package_publish_flow_changed "$package_publish_flow_changed"
        emit_bool binary_materialization_changed "$binary_materialization_changed"
        emit_bool kernel_runtime_changed "$kernel_runtime_changed"
        emit_bool test_gate_required "$test_gate_required"
        emit_bool kernel "$kernel_changed"
        emit_bool package_staging_required "$package_archive_changed"
        echo "package_staging_reason=$package_staging_reason" >> "$GITHUB_OUTPUT"

        if [ -z "$non_docs" ] && [ -n "$files" ]; then
          echo 'docs_only=true' >> "$GITHUB_OUTPUT"
          vitest_state='skip — docs-only diff'
        else
          echo 'docs_only=false' >> "$GITHUB_OUTPUT"
          vitest_state='will run'
        fi

        publish_state="$(summarize_matches 'package publish flow' "$package_publish_flow_files")"
        materialization_state="$(summarize_matches 'binary materialization' "$binary_materialization_files")"
        runtime_state="$(summarize_matches 'kernel runtime' "$kernel_runtime_files")"
        ci_state="$(summarize_matches 'CI scope control' "$ci_control_files")"
        uncategorized_state="$(summarize_matches 'uncategorized non-docs' "$uncategorized_non_docs_files")"

        echo "::notice::package staging: $package_staging_state | test gate: $test_gate_required | vitest: $vitest_state | cargo+libc-test+POSIX+sortix: $kernel_state"
        echo "::notice::$package_staging_reason | $publish_state | $materialization_state | $runtime_state | $ci_state | $uncategorized_state"
