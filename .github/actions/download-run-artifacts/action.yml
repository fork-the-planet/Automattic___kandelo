name: Download package run artifacts with retry
description: Download package artifacts from the current workflow run, retrying transient service failures.

inputs:
  github-token:
    description: Token with actions:read permission.
    required: true
  pattern:
    description: Package artifact name pattern to download, matching artifacts like <pkg>-wasm32 or <pkg>-wasm64.
    required: true
  path:
    description: Destination directory.
    required: true
  attempts:
    description: Number of download attempts.
    required: false
    default: "4"
  initial-delay-seconds:
    description: Base retry delay. Later attempts multiply this by the attempt number.
    required: false
    default: "10"

runs:
  using: composite
  steps:
    - name: Download artifacts
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ARTIFACT_PATTERN: ${{ inputs.pattern }}
        ARTIFACT_PATH: ${{ inputs.path }}
        ARTIFACT_ATTEMPTS: ${{ inputs.attempts }}
        ARTIFACT_POLL_SECONDS: ${{ inputs.initial-delay-seconds }}
      run: |
        set -euo pipefail
        rm -rf "$ARTIFACT_PATH"
        bash .github/scripts/download-dependency-artifacts.sh \
          --pattern "$ARTIFACT_PATTERN" \
          --output "$ARTIFACT_PATH"
