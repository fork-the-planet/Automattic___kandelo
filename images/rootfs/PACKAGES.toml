# Base VFS package composition.
#
# Entries here are turned into a generated mkrootfs manifest fragment by
# scripts/generate-rootfs-package-manifest.mjs and included by
# scripts/build-rootfs.sh. Package outputs default to lazy files: rootfs.vfs
# stores an executable stub plus URL/size metadata, and the real Wasm is fetched
# on first exec by hosts that run programs from the VFS.

default_install = "lazy"

# Runtime URL prefix for lazy files. The generator resolves binary sizes from
# local-binaries/ first and binaries/ second, but the image metadata should name
# the release/deployment URL. Hosts with a different deployment layout can
# rewrite lazy file URLs after MemoryFileSystem.fromImage().
lazy_url_prefix = "binaries/"

[[packages]]
name = "dash"

[[packages.outputs]]
binary = "programs/wasm32/dash.wasm"
path = "/usr/bin/dash"
aliases = ["/bin/dash", "/bin/sh", "/usr/bin/sh"]

