# ncurses provides both link-time libraries and the standard terminal
# utilities. The package schema currently has one declared output shape per
# manifest, so this is a program package whose build still installs
# libncursesw/libtinfow and headers into the same prefix for consumers that
# depend on ncurses as a link-time input.
#
# No wasm deps (host `tic`/`infocmp` are built out-of-band inside the
# lib dir — they're host binaries, not cacheable wasm artifacts, so
# they don't go through the resolver). The compiled-in terminal
# fallback entries (xterm-256color, xterm, vt100, dumb) are linked
# into libtinfow.a via MKfallback.sh; consumers don't need a runtime
# terminfo database for the common demo terminals.

kind = "program"

name = "ncurses"
version = "6.5"
kernel_abi = 7
depends_on = []

[source]
url = "https://ftpmirror.gnu.org/gnu/ncurses/ncurses-6.5.tar.gz"
sha256 = "136d91bc269a9a5785e5f9e980bc76ab57428f604ce3e5a5a90cebc767971cc6"

[license]
spdx = "X11"
url = "https://invisible-island.net/ncurses/ncurses-license.html"

[build]
script_path = "packages/registry/ncurses/build-ncurses.sh"

[[outputs]]
name = "clear"
wasm = "clear.wasm"

[[outputs]]
name = "reset"
wasm = "reset.wasm"

[[outputs]]
name = "tset"
wasm = "tset.wasm"

[[outputs]]
name = "tput"
wasm = "tput.wasm"

[[outputs]]
name = "tabs"
wasm = "tabs.wasm"

[[outputs]]
name = "tic"
wasm = "tic.wasm"

[[outputs]]
name = "infocmp"
wasm = "infocmp.wasm"

[[outputs]]
name = "toe"
wasm = "toe.wasm"

[[outputs]]
name = "captoinfo"
wasm = "captoinfo.wasm"

[[outputs]]
name = "infotocap"
wasm = "infotocap.wasm"
