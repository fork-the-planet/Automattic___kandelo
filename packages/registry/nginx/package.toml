kind = "program"
name = "nginx"
version = "1.24.0"
kernel_abi = 7
depends_on = []

[source]
url = "https://nginx.org/download/nginx-1.24.0.tar.gz"
sha256 = "77a2541637b92a621e3ee76776c8b7b40cf6d707e69ba53a940283e30ff2f55d"

[license]
spdx = "BSD-2-Clause"
url = "https://nginx.org/LICENSE"

# The actual build lives at packages/registry/nginx/build-nginx-local.sh (it's been there since
# pre-package-system and does the configure-from-tarball + asyncify dance). Point the
# resolver at it via [build].script_path.
[build]
script_path = "packages/registry/nginx/build-nginx.sh"

[[outputs]]
name = "nginx"
wasm = "nginx.wasm"
