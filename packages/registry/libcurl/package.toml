# Per-library manifest for libcurl. See docs/package-management.md.
#
# The logical name is "libcurl" (matches the directory). Consumers
# reference it as `libcurl@8.11.1` in their own `depends_on`, and the
# resolver surfaces the install path via `WASM_POSIX_DEP_LIBCURL_DIR`.
# The curl CLI lives outside the resolver's scope — it's a consumer
# artifact, not a library — and is still built in legacy mode (see
# `build-libcurl.sh`).

kind = "library"

name = "libcurl"
version = "8.11.1"
kernel_abi = 7
depends_on = ["zlib@1.3.1", "openssl@3.3.2"]

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[license]
spdx = "curl"
url = "https://curl.se/docs/copyright.html"

[build]
script_path = "packages/registry/libcurl/build-libcurl.sh"

[outputs]
libs = ["lib/libcurl.a"]
# curl installs ~12 headers under include/curl/. Declare the directory
# (validator accepts dirs; matches openssl/ncurses pattern) instead of
# listing each header — churn-free across version bumps.
headers = ["include/curl"]
pkgconfig = ["lib/pkgconfig/libcurl.pc"]
