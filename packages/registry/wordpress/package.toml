kind = "program"
name = "wordpress"
version = "7.0"
kernel_abi = 7
# build-wp-vfs-image.ts bakes a service image: dinit as PID 1, nginx,
# php-fpm/opcache, the WordPress tree, and the SQLite drop-in. It does
# not bake the shell toolset; service inspection happens from a separate
# shell process in the browser host.
depends_on = [
    "nginx@1.24.0",
    "php@8.3.2",
    "dash@0.5.12",
    "coreutils@9.6",
    "dinit@0.19.4",
    "msmtpd@1.8.32",
]

[source]
url = "https://wordpress.org/wordpress-7.0.tar.gz"
sha256 = "530c8fdeb16fb0affdb53eb727b6a04bb8d166621c20029e389cabb01a0fa921"

[license]
spdx = "GPL-2.0-or-later"
url = "https://wordpress.org/about/gpl/"

[build]
script_path = "packages/registry/wordpress/build-wordpress.sh"

[[outputs]]
name = "wordpress"
wasm = "wordpress.vfs.zst"
