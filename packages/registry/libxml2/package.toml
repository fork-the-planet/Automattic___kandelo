# Per-library manifest for libxml2. See docs/package-management.md.
#
# libxml2 depends on zlib for optional compressed-input support and GNU
# libiconv for non-UTF/XML encodings. Other optional deps (lzma, icu, python,
# etc.) are disabled via `--without-*` in build-libxml2.sh.

kind = "library"

name = "libxml2"
version = "2.13.8"
kernel_abi = 7
depends_on = ["zlib@1.3.1", "libiconv@1.17"]
# The direct-compile recipe currently uses the wasm32 SDK explicitly. PHP is
# also wasm32-only, so advertise only the architecture this package builds.
arches = ["wasm32"]

[source]
url = "https://download.gnome.org/sources/libxml2/2.13/libxml2-2.13.8.tar.xz"
sha256 = "277294cb33119ab71b2bc81f2f445e9bc9435b893ad15bb2cd2b0e859a0ee84a"

[license]
spdx = "MIT"
url = "https://gitlab.gnome.org/GNOME/libxml2/-/blob/v2.13.8/Copyright"

[build]
script_path = "packages/registry/libxml2/build-libxml2.sh"

[outputs]
# Note: the in-tree build installs headers directly under
# include/libxml/ rather than upstream's include/libxml2/libxml/ —
# consumers link with `-I$prefix/include` + `#include <libxml/...>`.
# See build-libxml2.sh for context (libtool mishandles the wasm .o
# naming, so the script compiles + installs by hand).
libs = ["lib/libxml2.a"]
headers = ["include/libxml"]
pkgconfig = ["lib/pkgconfig/libxml-2.0.pc"]
